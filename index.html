function selectAnswer(shuffledIdx, origIdx, qId) {
  if (state.answered) return;
  state.answered = true;
  initProgress(qId);

  const q = getQ(qId);
  const correct = origIdx === q.a;
  const letters = ['A','B','C','D'];

  // Tô màu đáp án
  state.shuffledOpts.forEach((opt, i) => {
    const el = document.getElementById(`opt-${i}`);
    el.classList.add('disabled');
    if (opt.origIdx === q.a) el.classList.add('correct');
    else if (i === shuffledIdx && !correct) el.classList.add('wrong');
  });

  // LOGIC CẬP NHẬT ĐÚNG/SAI CHUẨN XÁC
  if (correct) {
    state.progress[qId].correct = 1;
    state.progress[qId].wrong = 0;
    // everWrong KHÔNG bị xóa — câu đã từng sai sẽ lưu mãi trong danh sách câu sai
  } else {
    state.progress[qId].correct = 0;
    state.progress[qId].wrong = 1;
    state.progress[qId].everWrong = true; // Lưu vĩnh viễn, chỉ xóa khi user tự xóa
  }
  saveState();

  // TÍNH LẠI THÔNG SỐ ĐỂ CẬP NHẬT NGAY LÊN GIAO DIỆN
  const uniqueIds = [...new Set(state.queue)];
  let countCorrect = 0, countWrong = 0;
  uniqueIds.forEach(id => {
    const pr = state.progress[id];
    if (pr && pr.wrong > 0) countWrong++;
    else if (pr && pr.correct > 0) countCorrect++;
  });

  const infoEl = document.querySelector('.quiz-info');
  if (infoEl) {
    infoEl.innerHTML = `Câu <b>${state.qIdx+1}</b>/${state.queue.length} &nbsp;·&nbsp; Tổng đúng: <b>${countCorrect}</b> &nbsp;·&nbsp; Đang sai: <b style="color:var(--red)">${countWrong}</b>`;
  }

  // Khối phản hồi & Lời giải thích của hệ thống
  const fb = document.getElementById('feedbackBox');
  const correctOptText = q.o[q.a];
  const explainHtml = q.e ? `<div style="margin-top:12px; padding-top:12px; border-top:1px dashed currentColor; font-size:13px; line-height:1.55">💡 <b>Giải thích:</b> ${q.e}</div>` : '';

  // KHỐI GHI CHÚ CÁ NHÂN (Tự động tải ghi chú cũ lên nếu có)
  const currentNote = customNotes[qId] || '';
  const noteHtml = `
    <div style="margin-top:16px; padding-top:14px; border-top:1px dashed rgba(255,255,255,0.15); text-align:left; color:var(--text);">
      <div style="font-size:13px; font-weight:700; margin-bottom:6px; color:var(--muted)">📌 Ghi chú cá nhân (Kiến thức muốn nhớ thêm):</div>
      <textarea id="custom-note-${qId}" 
        style="width:100%; min-height:75px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px; font-family:inherit; font-size:13px; line-height:1.5; resize:vertical; margin-bottom:8px; outline:none;" 
        placeholder="Nhập những điều bên lề bạn tự đúc kết cho câu này tại đây...">${currentNote}</textarea>
      <div style="text-align: right;">
        <button class="btn btn-secondary btn-sm" onclick="saveNote(${qId})" style="font-size:12px; padding:6px 12px; background:var(--surface2); border-color:var(--border);">💾 Lưu ghi chú</button>
      </div>
    </div>
  `;

  if (correct) {
    fb.className = 'feedback-box correct';
    fb.innerHTML = `✅ Chính xác! Đáp án: <b>${letters[state.shuffledOpts.findIndex(o=>o.origIdx===q.a)]}. ${correctOptText}</b>${explainHtml}${noteHtml}`;
  } else {
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `❌ Sai rồi! Đáp án đúng: <b>${letters[state.shuffledOpts.findIndex(o=>o.origIdx===q.a)]}. ${correctOptText}</b>${explainHtml}${noteHtml}`;
  }
  fb.style.display = 'block';
  if (window.MathJax && window.MathJax.typeset) { window.MathJax.typeset(); }

  // Cập nhật nút chuyển câu
  if (state.singleQuestionMode) {
    const returnFn = state.returnView === 'wrongList' ? 'renderWrongList()' : 'renderMarkedList()';
    document.getElementById('quizActions').innerHTML = `
      <button class="btn btn-secondary" onclick="${returnFn}">← Quay lại danh sách</button>
    `;
  } else {
    document.getElementById('quizActions').innerHTML = `
      <button class="btn btn-primary" onclick="nextQ()">Câu tiếp theo →</button>
      <button class="btn btn-secondary" onclick="skipQ()">⏭ Bỏ qua</button>
    `;
  }
}

function nextQ() {
  const lastQId = state.queue[state.qIdx];
  const p = state.progress[lastQId];
  state.qIdx++;

  // Nếu câu vừa rồi trả lời sai, tự động nhét nó vào lại hàng đợi (cách 3 câu)
  if (p && p.wrong > 0) {
    const insertPos = Math.min(state.qIdx + 3, state.queue.length);
    state.queue.splice(insertPos, 0, lastQId);
  }
  saveState(); // Cập nhật vị trí
  loadQuestion();
}

function skipQ() {
  state.qIdx++;
  saveState(); // Cập nhật vị trí
  loadQuestion();
}

function toggleFlag(type, qId) {
  initProgress(qId);
  state.progress[qId][type] = !state.progress[qId][type];
  saveState();
  
  const btn = document.getElementById(`btn-flag-${type}`);
  if (btn) {
    if (state.progress[qId][type]) {
      btn.classList.add(`active-${type}`);
    } else {
      btn.classList.remove(`active-${type}`);
    }
  }
}

// ============================================================
// EXAM SETUP
// ============================================================
function renderExamSetup() {
  state.mode = 'home';
  updateHeader();
  let chapterOpts = CHAPTERS.map(ch=>`<option value="${ch.id}">${ch.name} (${ch.ids.filter(id=>QUESTIONS.find(q=>q.id===id)).length} câu)</option>`).join('');

  app.innerHTML = `
  <div class="nav-tabs">
    <button class="nav-tab" onclick="renderHome()">📚 Ôn tập</button>
    <button class="nav-tab active" onclick="renderExamSetup()">🎯 Thi thử</button>
    <button class="nav-tab" onclick="renderNotesView()">📝 Ghi chú</button>
  </div>
  <div class="exam-setup">
    <h2>🎯 Thi thử</h2>
    <div class="form-group">
      <label>Chương</label>
      <select id="examChapter">${chapterOpts}</select>
    </div>
    <div class="form-group">
      <label>Số câu</label>
      <input type="number" id="examCount" value="30" min="5" max="${QUESTIONS.length}">
    </div>
    <div class="form-group">
      <label>Thời gian (phút, 0 = không giới hạn)</label>
      <input type="number" id="examTime" value="45" min="0" max="180">
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
      <button class="btn btn-primary" onclick="startExam()">🚀 Bắt đầu thi</button>
      <button class="btn btn-secondary" onclick="renderHome()">← Quay lại</button>
    </div>
  </div>`;
}

function startExam() {
  const chapterId = parseInt(document.getElementById('examChapter').value);
  const count = Math.max(1, parseInt(document.getElementById('examCount').value)||30);
  const minutes = parseInt(document.getElementById('examTime').value)||0;

  const allIds = chapterQuestions(chapterId, 'all');
  const picked = shuffleArray(allIds).slice(0, Math.min(count, allIds.length));

  state.examQuestions = picked.map(id => {
    const q = getQ(id);
    return { id, shuffledOpts: getShuffledOpts(q) };
  });
  state.examAnswers = {};
  state.examDuration = minutes * 60;
  state.examTime = state.examDuration;
  state.mode = 'exam';
  state.qIdx = 0;

  if (state.examTimer) clearInterval(state.examTimer);
  if (minutes > 0) {
    state.examTimer = setInterval(() => {
      state.examTime--;
      const badge = document.getElementById('timerBadge');
      if (badge) {
        const m = Math.floor(state.examTime/60), s = state.examTime%60;
        badge.textContent = `${m}:${s.toString().padStart(2,'0')}`;
        badge.className = 'timer-badge' + (state.examTime < 60 ? ' urgent' : '');
      }
      if (state.examTime <= 0) { clearInterval(state.examTimer); submitExam(); }
    }, 1000);
  }
  renderExam();
}

function renderExam() {
  const eq = state.examQuestions[state.qIdx];
  const q = getQ(eq.id);
  const total = state.examQuestions.length;
  const answered = Object.keys(state.examAnswers).length;
  const letters = ['A','B','C','D'];

  let timerHtml = '';
  if (state.examDuration > 0) {
    const m = Math.floor(state.examTime/60), s = state.examTime%60;
    timerHtml = `<div class="timer-badge" id="timerBadge">${m}:${s.toString().padStart(2,'0')}</div>`;
  }

  let html = `
  <div class="quiz-header">
    <div class="quiz-info">Câu <b>${state.qIdx+1}</b>/${total} &nbsp;·&nbsp; Đã trả lời: <b>${answered}</b>/${total}</div>
    <div style="display:flex;gap:8px;align-items:center">
      ${timerHtml}
      <button class="btn btn-danger btn-sm" onclick="if(confirm('Nộp bài?'))submitExam()">Nộp bài</button>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-bar-fill" style="width:${(state.qIdx+1)/total*100}%"></div></div>

  <div class="question-card">
    <div class="q-num">CÂU ${q.id} / ${QUESTIONS.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="optList">`;

  const selected = state.examAnswers[eq.id];
  eq.shuffledOpts.forEach((opt, i) => {
    const isSelected = selected === i;
    html += `<div class="option ${isSelected?'correct':''}" style="${isSelected?'':'opacity:0.9'}" onclick="examSelect(${i})">
      <span class="opt-letter" style="${isSelected?'background:var(--accent);color:#fff':''}">
        ${letters[i]}${isSelected?' ✓':''}
      </span>
      <span>${opt.text}</span>
    </div>`;
  });

  html += `</div></div>
  <div class="quiz-actions">
    <button class="btn btn-secondary" onclick="examNav(-1)" ${state.qIdx===0?'disabled':''}>← Trước</button>
    <button class="btn btn-primary" onclick="examNav(1)" ${state.qIdx===total-1?'disabled':''}>Tiếp →</button>
  </div>

  <div style="margin-top:20px">
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:600">BẢNG CÂU HỎI</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">`;

  state.examQuestions.forEach((eq2, i) => {
    const isAns = state.examAnswers[eq2.id] !== undefined;
    const isCur = i === state.qIdx;
    html += `<button onclick="state.qIdx=${i};renderExam()" style="
      width:34px;height:34px;border-radius:7px;border:1.5px solid ${isCur?'var(--accent)':isAns?'var(--green)':'var(--border)'};
      background:${isCur?'var(--accent)':isAns?'rgba(34,211,165,.15)':'var(--surface2)'};
      color:${isCur?'#fff':isAns?'var(--green)':'var(--muted)'};
      font-size:11px;font-weight:700;cursor:pointer;font-family:Space Mono,monospace">${i+1}</button>`;
  });

  html += `</div></div>`;
  app.innerHTML = html;
  if (window.MathJax && window.MathJax.typeset) { window.MathJax.typeset(); }
}

function examSelect(i) {
  const eq = state.examQuestions[state.qIdx];
  state.examAnswers[eq.id] = i;
  renderExam();
}

function examNav(dir) {
  state.qIdx = Math.max(0, Math.min(state.examQuestions.length-1, state.qIdx+dir));
  renderExam();
}

function submitExam() {
  if (state.examTimer) { clearInterval(state.examTimer); state.examTimer=null; }
  let correct=0, wrong=0, unanswered=0;
  const details = [];

  state.examQuestions.forEach(eq => {
    const q = getQ(eq.id);
    const selectedShuffled = state.examAnswers[eq.id];
    if (selectedShuffled === undefined) {
      unanswered++;
      details.push({q, eq, selectedOrig:null, correctOrig:q.a, isCorrect:false});
    } else {
      const selectedOrig = eq.shuffledOpts[selectedShuffled].origIdx;
      const isCorrect = selectedOrig === q.a;
      if (isCorrect) correct++;
      else wrong++;
      details.push({q, eq, selectedOrig, correctOrig:q.a, isCorrect});
    }
  });

  const total = state.examQuestions.length;
  const score = Math.round(correct/total*10*10)/10;
  const pct = Math.round(correct/total*100);
  const pass = pct >= 50;
  state.mode = 'examResult';
  renderExamResult({correct, wrong, unanswered, total, score, pct, pass, details});
}

function renderExamResult({correct,wrong,unanswered,total,score,pct,pass,details}) {
  const letters = ['A','B','C','D'];
  let html = `
  <div class="result-card">
    <div class="result-score ${pass?'pass':'fail'}">${score}/10</div>
    <div class="result-label">${pass?'🎉 Đạt yêu cầu!':'📚 Cần ôn thêm!'} — ${pct}% đúng</div>
    <div class="result-stats">
      <div class="stat"><b style="color:var(--green)">${correct}</b><span>Đúng</span></div>
      <div class="stat"><b style="color:var(--red)">${wrong}</b><span>Sai</span></div>
      <div class="stat"><b style="color:var(--muted)">${unanswered}</b><span>Bỏ qua</span></div>
      <div class="stat"><b>${total}</b><span>Tổng</span></div>
    </div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" onclick="renderExamSetup()">🔄 Thi lại</button>
    <button class="btn btn-secondary" onclick="renderHome()">← Về trang chủ</button>
  </div>
  <div style="font-size:14px;font-weight:700;color:var(--muted);margin-bottom:12px">PHÂN TÍCH ĐÁP ÁN</div>`;

  details.forEach((d, i) => {
    const correctLetter = letters[d.eq.shuffledOpts.findIndex(o=>o.origIdx===d.correctOrig)];
    const correctText = d.q.o[d.correctOrig];
    let selectedInfo = '';
    if (d.selectedOrig !== null) {
      const selLetter = letters[d.eq.shuffledOpts.findIndex(o=>o.origIdx===d.selectedOrig)];
      const selText = d.q.o[d.selectedOrig];
      if (!d.isCorrect) selectedInfo = `<div style="font-size:12px;color:var(--red);margin-top:5px">❌ Bạn chọn: ${selLetter}. ${selText}</div>`;
    } else {
      selectedInfo = `<div style="font-size:12px;color:var(--muted);margin-top:5px">— Không trả lời</div>`;
    }

    const examExplainHtml = d.q.e ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.6">${d.q.e}</div>` : '';
    html += `<div style="background:var(--surface);border:1.5px solid ${d.isCorrect?'var(--border)':'var(--red)'};border-radius:12px;padding:14px 16px;margin-bottom:10px">
      <div style="font-size:11px;color:${d.isCorrect?'var(--green)':'var(--red)'};font-weight:700;margin-bottom:6px">${d.isCorrect?'✅':'❌'} Câu ${d.q.id}</div>
      <div style="font-size:14px;font-weight:600;line-height:1.5;margin-bottom:8px">${d.q.q}</div>
      <div style="font-size:13px;color:var(--green)">✔ Đáp án đúng: <b>${correctLetter}. ${correctText}</b></div>
      ${selectedInfo}${examExplainHtml}
    </div>`;
  });

  app.innerHTML = html;
  updateHeader();
  if (window.MathJax && window.MathJax.typeset) { window.MathJax.typeset(); }
}

// ============================================================
// RESET
// ============================================================
function resetAllProgress() {
  if (!confirm('⚠️ Xóa toàn bộ tiến độ (đúng/sai) và vị trí đang học của tất cả các chương? Không thể hoàn tác!')) return;

  // 1. Xóa sạch bộ nhớ trên biến tạm
  state.progress = {};
  state.sessions = {}; // QUAN TRỌNG: Xóa sạch các vị trí đang học dở
  state.queue = [];
  state.qIdx = 0;

  // 2. Ghi đè bộ nhớ rỗng xuống LocalStorage
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      progress: {},
      sessions: {},
      chapterId: 0,
      filter: 'all',
      isShuffled: false
    }));
  } catch(e){}

  showToast('Đã khôi phục cài đặt gốc toàn bộ!');
  renderHome(); // Quay về trang chủ
}

// ============================================================
// INIT
// ============================================================
renderHome();
</script>
</body>
</html>
