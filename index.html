<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSDL Quiz — Cơ Sở Dữ Liệu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #ff6b9d;
    --green: #22d3a5;
    --red: #ff5c6a;
    --yellow: #ffd166;
    --text: #e8eaf6;
    --muted: #8890b0;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .logo span { color: var(--accent2); }
  .header-stats { display: flex; gap: 16px; font-size: 13px; color: var(--muted); }
  .header-stats b { color: var(--text); }

  /* ===== MAIN LAYOUT ===== */
  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ===== HOME / CHAPTER SELECT ===== */
  .home-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .home-sub { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
  .chapter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .chapter-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .chapter-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,99,255,.15); }
  .chapter-card.selected { border-color: var(--accent); background: rgba(108,99,255,.08); }
  .chapter-card h3 { font-size: 13px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .chapter-card p { font-size: 13px; color: var(--muted); line-height: 1.4; }
  .chapter-card .c-count {
    position: absolute; top: 12px; right: 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: var(--accent2); background: rgba(255,107,157,.1);
    padding: 2px 7px; border-radius: 20px;
  }
  .chapter-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 10px; }
  .chapter-progress-fill { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width .4s; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 11px 22px; border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px; font-weight: 600;
    transition: all .2s; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5a52ee; box-shadow: 0 4px 20px rgba(108,99,255,.4); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(255,92,106,.15); color: var(--red); border: 1px solid rgba(255,92,106,.25); }
  .btn-danger:hover { background: rgba(255,92,106,.25); }
  .btn-yellow { background: rgba(255,209,102,.15); color: var(--yellow); border: 1px solid rgba(255,209,102,.25); }
  .btn-sm { padding: 7px 14px; font-size: 13px; }

  .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

  /* ===== QUIZ MODE ===== */
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .quiz-info { font-size: 13px; color: var(--muted); }
  .quiz-info b { color: var(--text); }
  .progress-bar { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 28px; }
  .progress-bar-fill { height: 5px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width .3s; }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    margin-bottom: 20px;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .q-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; }
  .q-text { font-size: 16px; font-weight: 600; line-height: 1.65; margin-bottom: 24px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
    transition: all .18s;
    font-size: 14px; line-height: 1.55;
  }
  .option:hover:not(.disabled) { border-color: var(--accent); background: rgba(108,99,255,.08); }
  .option.correct { border-color: var(--green); background: rgba(34,211,165,.1); }
  .option.wrong { border-color: var(--red); background: rgba(255,92,106,.1); }
  .option.disabled { cursor: default; }
  .opt-letter {
    min-width: 26px; height: 26px; border-radius: 7px;
    background: var(--border); display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--muted);
    transition: all .18s; flex-shrink: 0; margin-top: 1px;
  }
  .option.correct .opt-letter { background: var(--green); color: #000; }
  .option.wrong .opt-letter { background: var(--red); color: #fff; }
  .option:hover:not(.disabled) .opt-letter { background: var(--accent); color: #fff; }

  .feedback-box {
    margin-top: 18px; padding: 14px 18px;
    border-radius: 11px; font-size: 14px; line-height: 1.55;
    display: none;
  }
  .feedback-box.correct { background: rgba(34,211,165,.1); border: 1px solid rgba(34,211,165,.3); color: var(--green); }
  .feedback-box.wrong { background: rgba(255,92,106,.1); border: 1px solid rgba(255,92,106,.3); color: #ff8c96; }

  .quiz-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ===== FLAGS ===== */
  .flag-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .flag-btn {
    padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border);
    background: transparent; color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .15s;
    font-family: 'Be Vietnam Pro', sans-serif;
  }
  .flag-btn.active-unsure { border-color: var(--yellow); color: var(--yellow); background: rgba(255,209,102,.1); }
  .flag-btn.active-marked { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,157,.1); }

  /* ===== EXAM MODE ===== */
  .exam-setup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    max-width: 480px;
  }
  .exam-setup h2 { font-size: 20px; margin-bottom: 18px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .form-group select, .form-group input {
    width: 100%; padding: 10px 14px;
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 9px;
    color: var(--text); font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px;
    transition: border .15s;
  }
  .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--accent); }

  /* ===== EXAM RESULTS ===== */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    text-align: center;
    margin-bottom: 24px;
  }
  .result-score { font-family: 'Space Mono', monospace; font-size: 56px; font-weight: 700; line-height: 1; }
  .result-score.pass { color: var(--green); }
  .result-score.fail { color: var(--red); }
  .result-label { color: var(--muted); font-size: 14px; margin-top: 6px; margin-bottom: 20px; }
  .result-stats { display: flex; justify-content: center; gap: 32px; font-size: 14px; }
  .result-stats .stat b { display: block; font-size: 22px; font-family: 'Space Mono', monospace; }
  .result-stats .stat span { color: var(--muted); font-size: 12px; }

  /* ===== NAV TABS ===== */
  .nav-tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 24px; width: fit-content; }
  .nav-tab {
    padding: 9px 18px; border-radius: 9px; border: none; background: transparent;
    color: var(--muted); font-family: 'Be Vietnam Pro', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .nav-tab.active { background: var(--accent); color: #fff; }

  /* ===== FILTER BAR ===== */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .filter-chip {
    padding: 5px 12px; border-radius: 20px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif; transition: all .15s;
  }
  .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.1); }
  .filter-count { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600;
    transition: transform .3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== TIMER ===== */
  .timer-badge {
    font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700;
    background: var(--surface2); border: 1.5px solid var(--border);
    padding: 6px 14px; border-radius: 8px; color: var(--text);
  }
  .timer-badge.urgent { border-color: var(--red); color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ===== EMPTY STATE ===== */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  @media(max-width:600px) {
    .question-card { padding: 18px; }
    .q-text { font-size: 15px; }
    .result-stats { gap: 16px; }
  }
</style>

<body>

<div class="header">
  <div class="logo">CSDL<span>.</span>quiz</div>
  <div class="header-stats" id="headerStats">Chọn chương để bắt đầu</div>
</div>

<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA: 345 CÂU HỎI
// ============================================================
const QUESTIONS = [
{id:1,q:"Cơ sở dữ liệu là:",o:["Một bộ sưu tập rất lớn về các loại dữ liệu tác nghiệp, lưu trữ theo quy tắc.","Một bộ sưu tập rất lớn về các loại dữ liệu tác nghiệp","Tập các File dữ liệu tác nghiệp.","Kho dữ liệu tác nghiệp"],a:0},
{id:2,q:"Các loại dữ liệu bao gồm:",o:["Tập các File số liệu","Âm thanh, tiếng nói, chữ viết, văn bản, đồ hoạ, hình ảnh tĩnh, hình ảnh động....","Âm thanh, tiếng nói, chữ viết, văn bản, đồ hoạ, hình ảnh tĩnh hay hình ảnh động...dưới dạng nhị phân.","Âm thanh, tiếng nói, chữ viết, văn bản, đồ hoạ, hình ảnh tĩnh hay hình ảnh động được lưu trữ trong các bộ nhớ trong các dạng File."],a:2},
{id:3,q:"Cơ sở dữ liệu là tài nguyên thông tin chung, nghĩa là:",o:["Truy nhập trực tuyến.","Nhiều người sử dụng, không phụ thuộc vị trí địa lý, có phân quyền.","Nhiều người sử dụng.","Nhiều người sử dụng, có phân quyền."],a:1},
{id:4,q:"Hệ quản trị CSDL - HQTCSDL (DataBase Management System - DBMS) là:",o:["Hệ điều hành","Các phần mềm hệ thống.","Phần mềm điều khiển các chiến lược truy nhập CSDL.","Các phần mềm ứng dụng."],a:2},
{id:5,q:"Chức năng quan trọng của các dịch vụ có sở dữ liệu là:",o:["Cập nhật, sửa đổi, bổ sung dữ liệu","Khôi phục thông tin.","Tìm kiếm và tra cứu thông tin.","Xử lý, tìm kiếm, tra cưú, sửa đổi, bổ sung hay loại bỏ dữ liệu...."],a:3},
{id:6,q:"Ưu điểm cơ sở dữ liệu:",o:["Xuất hiện dị thường thông tin.","Các thuộc tính được mô tả trong nhiều tệp dữ liệu khác nhau.","Khả năng xuất hiện mâu thuẫn và không nhất quán dữ liệu.","Giảm dư thừa, nhất quán và toàn vẹn của dữ liệu."],a:3},
{id:7,q:"Dị thường thông tin có thể:",o:["Thừa thiếu thông tin trong lưu trữ.","Dữ liệu nhất quán và toàn vẹn.","Phản ánh đúng hiện thực khách quan dữ liệu.","Không xuất hiện mâu thuẫn thông tin."],a:0},
{id:8,q:"Không nhất quán dữ liệu trong lưu trữ:",o:["Không xuất hiện mâu thuẫn thông tin.","Làm cho dữ liệu mất đi tính toàn vẹn cuả nó.","Không thể sửa đổi, bổ sung, cập nhật dữ liệu.","Có thể triển khai tra cứu tìm kiếm."],a:1},
{id:9,q:"Tính toàn vẹn dữ liệu đảm bảo",o:["Cho sự lưu trữ dữ liệu luôn luôn đúng.","Phản ánh đúng hiện thực khách quan dữ liệu.","Giảm dư thừa, nhất quán và toàn vẹn của dữ liệu.","Cho việc cập nhật, sửa đổi, bổ sung dữ liệu.thuận lợi"],a:1},
{id:10,q:"An toàn dữ liệu có thể hiểu là:",o:["Ngăn chặn các truy nhập trái phép, sai quy định từ trong ra hoặc từ ngoài vào...","Tính nhất quán và toàn vẹn dữ liệu.","Dễ dàng cho công việc bảo trì dữ liệu.","Thống nhất các tiêu chuẩn, thủ tục và các biện pháp bảo vệ, an toàn dữ liệu"],a:0},
{id:11,q:"Thứ tự đúng các mức trong mô hình kiến trúc cơ sở dữ liệu:",o:["Mức ngoài, mức quan niệm và mức mô hình.","Mức quan niệm, mức trong và mức ngoài.","Mức ngoài, mức quan niệm và mức trong.","Mức trong, mức mô hình dữ liệu và mức ngoài."],a:2},
{id:12,q:"Người sử dụng có thể truy nhập:",o:["Một phần cơ sở dữ liệu","Phụ thuộc vào quyền truy nhập.","Toàn bộ cơ sở dữ liệu","Hạn chế"],a:1},
{id:13,q:"Cách nhìn cơ sở dữ liệu của người sử dụng bằng:",o:["Mô hình trong.","Mô hình ngoài.","Mô hình ngoài và mô hình dữ liệu","Mô hình dữ liệu."],a:1},
{id:14,q:"Mô hình ngoài là:",o:["Nội dung thông tin của toàn bộ CSDL","Nội dung thông tin của một phần dữ liệu dưới cách nhìn của người sử dụng.","Nội dung thông tin của toàn bộ CSDL dưới cách nhìn của người sử dụng.","Nội dung thông tin của một phần cơ sở dữ liệu"],a:1},
{id:15,q:"Mô hình quan niệm là:",o:["Cách nhìn dữ liệu ở mức ngoài.","Nội dung thông tin của một phần dữ liệu dưới cách nhìn của người sử dụng.","Cách nhìn dữ liệu một cách tổng quát của người sử dụng.","Nội dung thông tin của một phần dữ liệu."],a:1},
{id:16,q:"Mô hình trong là:",o:["Mô hình biểu diễn cơ sở dữ liệu trừu tượng ở mức quan niệm.","Có nhiều cách biểu diễn CSDL dưới dạng lưu trữ vật lý.","Mô hình lưu trữ vật lý dữ liệu.","Là một trong các mô hình biểu diễn CSDL dưới dạng lưu trữ vật lý."],a:2},
{id:17,q:"Ánh xạ quan niệm trong",o:["Bảo đảm tính độc lập của dữ liệu.","Bảo đảm tính phụ thuộc lẫn nhau giữa mô hình trong và mô hình ngoài.","Bảo đảm cấu trúc lưu trữ của mô hình dữ liệu không thay đổi.","Bảo đảm cấu trúc lưu trữ của CSDL khi có sự thay đổi."],a:0},
{id:18,q:"Ánh xạ quan niệm-ngoài:",o:["Quan hệ giữa mô hình ngoài và mô hình ngoài","Quan hệ giữa mô hình trong và mô hình trong","Quan hệ môt-một giữa mô hình ngoài và mô hình dữ liệu.","Quan hệ giữa mô hình ngoài và mô hình trong."],a:0},
{id:19,q:"Mục tiêu của cơ sở dữ liệu là:",o:["Không làm thay đổi chiến lược truy nhập cơ sở dữ liệu.","Không làm thay đổi cấu trúc lưu trữ dữ liệu.","Dữ liệu chỉ được biểu diễn, mô tả một cách duy nhất.","Bảo đảm tính độc lập dữ liệu"],a:3},
{id:20,q:"Hệ quản trị CSDL DBMS (DataBase Management System) là:",o:["Đảm bảo an toàn, bảo mật dữ liệu và tính toàn vẹn dữ liệu.","Tạo cấu trúc dữ liệu tương ứng với mô hình dữ liệu.","Hệ thống phần mềm điều khiển các chiến lược truy nhập và tổ chức lưu trữ cơ sở dữ liệu.","Cập nhật, chèn thêm, loại bỏ hay sửa đổi dữ liệu mức tệp."],a:2},
{id:21,q:"Người quản trị CSDL là:",o:["Quyết định cấu trúc lưu trữ & chiến lược truy nhập","Xác định chiến lược lưu trữ, sao chép, phục hồi dữ liệu.","Cho phép người sử dụng những quyền truy nhập cơ sở dữ liệu","Một người hay một nhóm người có khả năng chuyên môn cao về tin học, có trách nhiệm quản lý và điều khiển toàn bộ hoạt động của các hệ CSDL"],a:3},
{id:22,q:"Ràng buộc dữ liệu",o:["Các định nghĩa, tiên đề, định lý","Quy tắc biểu diễn cấu trúc dữ liệu.","Mối quan hệ giữa các thực thể dữ liệu.","Các quy tắc, quy định."],a:3},
{id:23,q:"Ràng buộc kiểu:",o:["Quy tắc đặt tên cơ sở dữ liệu.","Mô tả tính chất của các thuộc tính khi tạo lập CSDL","Quy tắc truy nhập cơ sở dữ liệu.","Mối quan hệ giữa các thực thể dữ liệu."],a:1},
{id:24,q:"Ràng buộc giải tích:",o:["Mối quan hệ giữa các thuộc tính được biểu diễn bằng các biểu thức toán học.","Quy tắc biểu diễn cấu trúc dữ liệu.","Các phép toán đại số quan hệ","Mô tả tính chất của các thuộc tính khi tạo lập CSDL"],a:0},
{id:25,q:"Ràng buộc logic:",o:["Các phép so sánh.","Mối quan hệ giữa các thuộc tính được biểu diễn bằng các biểu thức toán học.","Mối quan hệ giữa các thuộc tính được biểu diễn bằng các phụ thuộc hàm.","Các phép toán quan hệ"],a:2},
{id:26,q:"Mô hình cơ sở dữ liệu Client-Server:",o:["Máy chủ và máy đều tham gia quá trình xử lý.","Máy khách thực hiện các ứng dụng, nó gửi yêu cầu về máy chủ được kết nối với cơ sở dữ liệu, máy chủ xử lý và gửi trả lại kết quả về máy khách.","Máy khách yêu cầu máy chủ cung cấp các loại dịch vụ.","Các máy khách chia sẻ gánh nặng xử lý của máy chủ trung tâm."],a:1},
{id:27,q:"Đặc trưng của một mô hình dữ liệu:",o:["Mô hình dữ liệu đơn giản.","Biểu diễn dữ liệu đơn giản và không cấu trúc.","Tính ổn định, tính đơn giản, cần phải kiểm tra dư thừa , đối xứng và có cơ sở lý thuyết vững chắc.","Người sử dụng có quyền truy nhập tại mọi lúc, mọi nơi."],a:2},
{id:28,q:"Mô hình dữ liệu tốt nhất:",o:["Khi thao tác dễ dàng nhất.","Không tổn thất thông tin.","Phụ thuộc vào yêu cầu truy xuất và khai thác thông tin.","Độc lập dữ liệu"],a:2},
{id:29,q:"Mô hình dữ liệu nào có khả năng hạn chế sự dư thừa dữ liệu tốt hơn.",o:["Tất cả các loại mô hình dữ liệu.","Mô hình dữ liệu hướng đối tượng.","Mô hình cơ sở dữ liệu phân cấp","Mô hình cơ sỏ dữ liệu phân tán."],a:1},
{id:30,q:"Mô hình dữ liệu nào không chấp nhận mối quan hệ nhiều - nhiều.",o:["Mô hình dữ liệu mạng","Cơ sở dữ liệu phân cấp.","Tất cả các mô hình dữ liệu.","Cơ sở dữ liệu phân tán."],a:1},
{id:31,q:"Mô hình CSDL phân cấp là mô hình:",o:["Dữ liệu được biểu diễn bằng con trỏ.","Dữ liệu được biểu diễn bằng cấu trúc cây.","Dữ liệu được biểu diễn bằng mối quan hệ thực thể","Dữ liệu được biểu diễn bằng bảng"],a:1},
{id:32,q:"Trong mô hình CSDL phân cấp có thể:",o:["Không có bản ghi gốc.","Tồn tại các loại cây không chứa gốc và phụ thuộc.","Các bản ghi phụ thuộc chỉ tồn tại khi và chỉ khi tồn tại bản ghi gốc.","Tồn tại các loại cây chỉ có các bản ghi phụ thuộc."],a:2},
{id:33,q:"Điều gì sẽ xẩy ra khi loại bỏ bản ghi gốc duy nhất trong một cây.",o:["Mâu thuẫn thông tin.","Dư thừa thông tin.","Không toàn vẹn dữ liệu.","Mất thông tin"],a:3},
{id:34,q:"Mất thông tin khi xoá bản ghi phụ thuộc trong trường hợp:",o:["Xoá bản ghi gốc.","Xoá tất cả các bản ghi phụ thuộc","Xoá cấu trúc cây phân cấp.","Xoá bản ghi phụ thuộc duy nhất."],a:3},
{id:35,q:"Tìm kiếm thông tin trong CSDL phân cấp:",o:["CSDL phân cấp càng lớn thì tìm kiếm càng phức tạp.","Đơn giản, tiện lợi.","Dễ thao tác, dễ sử dụng","Nhanh chóng, chính xác."],a:0},
{id:36,q:"Trong mô hình phân cấp dữ liệu được biểu diễn:",o:["Trong mỗi một cây, một bản gốc và bản ghi phụ thuộc.","Trong một tệp duy nhất theo cấu trúc cây.","Trong nhiều cây","Trong nhiều tệp theo cấu trúc cây."],a:2},
{id:37,q:"Khi thao tác bằng ngôn ngữ thao tác dữ liệu trên CSDL phân cấp:",o:["Có nhiều khả năng xảy ra dị thường thông tin.","Đảm bảo tính toàn vẹn của dữ liệu.","Đảm bảo tính độc lập của dữ liệu.","Đảm bảo tính ổn định."],a:0},
{id:38,q:"Đặc trưng cấu trúc của mô hình mạng là:",o:["Chứa các liên kết một - một và một - nhiều.","Chứa các liên kết một - một, một - nhiều và nhiều - nhiều.","Chứa các liên kết một - một, một - nhiều và nhiều - nhiều.","Chứa các liên kết nhiều - một và một - nhiều."],a:0},
{id:39,q:"Biểu diễn dữ liệu trong mô hình CSDL mạng:",o:["Bằng các bảng 2 chiều.","Các mối nối liên kết giữa các bản ghi, tạo thành một đồ thị có hướng.","Bằng các ký hiệu biểu diễn.","Các mối nối liên kết giữa các bản ghi theo cấu trúc cây."],a:1},
{id:40,q:"Trong CSDL mạng, khi thêm các bản ghi mới:",o:["Mâu thuẫn thông tin.","Dư thừa thông tin.","Đảm bảo được tính nhất quán và tính toàn vẹn của dữ liệu.","Không đảm bảo tính nhất quán và toàn vẹn của dữ liệu."],a:3},
{id:41,q:"Trong CSDL mạng, khi xoá các bản ghi:",o:["Không toàn vẹn dữ liệu.","Làm mất thông tin","Mâu thuẫn thông tin sẽ xuất hiện","Đảm bảo được tính nhất quán và tính toàn vẹn của dữ liệu."],a:1},
{id:42,q:"Trong CSDL mạng, khi thực hiện các phép sửa đổi nội dung dữ liệu:",o:["Đảm bảo tính toàn vẹn dữ liệu.","Không dư thừa thông tin.","Làm xuất hiện mâu thuẫn dữ liệu.","Không làm xuất hiện mâu thuẫn dữ liệu."],a:2},
{id:43,q:"Trong CSDL mạng, khi thực hiện các phép tìm kiếm:",o:["Câu hỏi và kết quả các câu hỏi tìm kiếm không đối xứng với nhau.","CSDL càng lớn thì tìm kiếm càng phức tạp.","Câu hỏi và kết quả các câu hỏi tìm kiếm thường đối xứng với nhau.","Không phức tạp."],a:0},
{id:44,q:"Cấu trúc dữ liệu trong mô hình CSDL mạng:",o:["Quá phức tạp vì quá nhiều liên kết giữa các thực thể","Chứa 2 thực thể.","Quá phức tạp vì quá nhiều các thực thể.","Chứa n thực thể."],a:0},
{id:45,q:"Trong mô hình cơ sở dữ liệu quan hệ:",o:["Thứ tự của các cột là quan trọng.","Thứ tự của các cột là không quan trọng.","Thứ tự của các hàng là không quan trọng.","Thứ tự của các hàng là quan trọng."],a:1},
{id:46,q:"Cấu trúc dữ liệu quan hệ là:",o:["Liên kết giữa các bộ được biểu diễn duy nhất bằng các giá trị trong các cột.","Mối liên kết giữa các bộ.","Mối liên kết hình cây.","Mối liên kết giữa các cột."],a:0},
{id:47,q:"Dữ liệu trong mô hình quan hệ:",o:["Được biểu diễn theo cấu trúc hình cây.","Được biểu diễn một cách duy nhất.","Được biểu diễn theo cấu trúc mô hình mạng.","Được biểu diễn nhiều kiểu khác nhau."],a:1},
{id:48,q:"Ngôn ngữ thao tác dữ liệu :",o:["Là các phép toán được xây dựng trên đại số quan hệ.","Là các phép chèn thêm, sửa đổi và loại bỏ.","Là các phép toán số học","Là các phép toán: hợp, giao, trừ..."],a:0},
{id:49,q:"Khi thực hiện các phép lưu trữ trên quan hệ:",o:["Dị thường thông tin, không bảo đảm được tính toàn vẹn dữ liệu.","Không dị thường thông tin, bảo đảm được tính toàn vẹn dữ liệu.","Dị thường thông tin, không bảo đảm được việc thực hiện truy vấn dữ liệu.","Không dị thường thông tin, là bảo đảm được tính độc lập dữ liệu"],a:1},
{id:50,q:"Kết quả của các thao tác dữ liệu là:",o:["Một biểu thức.","Một File","Một quan hệ.","Nhiều quan hệ."],a:2},
{id:51,q:"Ngôn ngữ thao tác dữ liệu quan hệ:",o:["Không toàn vẹn dữ liệu.","Đơn giản nhưng không tiện lợi cho người sử dụng.","Phức tạp, tổn thất thông tin.","Đơn giản và thuận tiện cho người sử dụng."],a:3},
{id:52,q:"Mô hình thực thể quan hệ cho phép mô tả:",o:["Bộ sưu tập các loại dữ liệu của một tổ chức.","Cấu trúc hệ thống cơ sở dữ liệu.","Hệ thống thông tin quan lý của tổ chức.","Lược đồ khái niệm của một tổ chức."],a:3},
{id:53,q:"Mô hình thực thể - quan hệ cơ bản bao gồm các lớp đối tượng:",o:["Thực thể và thuộc tính.","Môi trường và ranh giới môi trường","Thực thể, mối quan hệ và thuộc tính.","Các mối quan hệ."],a:2},
{id:54,q:"Thực thể là:",o:["Các đối tượng và mối liên kết giữa các đối tượng.","Các đối tượng dữ liệu","Các mối liên kết giữa các đối tượng.","Các quan hệ"],a:1},
{id:55,q:"R là một quan hệ trên tập $\\Omega$ khi và chỉ khi",o:["$R(\\Omega) \\subseteq D(a_{1}) \\times D(a_{2}) \\times ... \\times D(a_{n})$","$R(\\Omega) = D(a_{1}) \\times D(a_{2}) \\times ... \\times D(a_{n})$","$R(\\Omega) \\equiv D(a_{1}) \\times D(a_{2}) \\times ... \\times D(a_{n})$","$R(\\Omega) \\subset D(a_{1}) \\times D(a_{2}) \\times ... \\times D(a_{n})$"],a:0},
{id:56,q:"X là một tập con các thuộc tính, ký hiệu $X \\subseteq \\Omega$, khi và chỉ khi:",o:["Với mọi thuộc tính của X cũng là thuộc tính của $\\Omega$","Với mọi thuộc tính của $\\Omega$","Với mọi thuộc tính của $\\Omega$, cũng là thuộc tính của X","Nếu $A \\in \\Omega$, suy ra $A \\in X$."],a:0},
{id:57,q:"Phép chiếu X trên bộ r được hiểu là:",o:["X chứa r","Các giá trị của X chứa giá trị của r","r[X]","Các giá trị của r chứa giá trị của X"],a:3},
{id:58,q:"Ràng buộc logic là:",o:["Các mối liên kết giữa các thuộc tính biểu diễn bằng phụ thuộc hàm.","Mối liên kết một-một, một-nhiều và nhiều-nhiều..","Các mối liên kết giữa các thuộc tính biểu diễn bằng biểu thức toán học","Giữa một số thuộc tính có sự ràng buộc bằng các biểu thức toán học."],a:0},
{id:59,q:"X và Y là 2 tập con bất kỳ của $\\Omega$. Khi đó $X \\rightarrow Y$ nghĩa là:",o:["$(\\forall r, s \\in R)(r(X) = s(X) \\Rightarrow r(Y) = s(Y))$","Một giá trị của Y được xác định bởi một giá trị của X.","Khi đối số trùng nhau thì hàm có nhiều giá trị.","$(\\forall r, s \\in R)((\\forall a \\in X)(r(a) = s(a)) \\Rightarrow (\\forall b \\in Y)(r(b) = s(b)))$."],a:3},
{id:60,q:"Khẳng định nào là phụ thuộc hàm:",o:["Họ và tên $\\rightarrow$ Số chứng minh thư","Họ và tên $\\rightarrow$ Địa chỉ","Họ và tên $\\rightarrow$ Số điện thoại nhà riêng","Số chứng minh thư $\\rightarrow$ Họ và tên"],a:3},
{id:61,q:"Hệ tiên đề Armstrong cho các phụ thuộc hàm gồm các quy tắc:",o:["Phản xạ, hợp và tách.","Phản xạ, bắc cầu, hợp và tách.","Phản xạ, gia tăng, hợp và tách.","Phản xạ, gia tăng, bắc cầu."],a:3},
{id:62,q:"Quy tắc phản xạ trong hệ tiên đề Armstrong:",o:["Nếu $B \\subseteq A$ thì $B \\rightarrow A$.","Nếu $B \\subseteq A$ thì $A \\rightarrow B$.","Nếu $A \\subseteq B$ thì $B \\rightarrow A$.","Nếu $A \\subseteq B$ thì $A \\rightarrow B$."],a:1},
{id:63,q:"Quy tắc gia tăng trong hệ tiên đề Armstrong:",o:["Nếu $A \\rightarrow B$ thì $B \\rightarrow A$","Nếu $A \\rightarrow B$ thì $A \\rightarrow BC$","Nếu $A \\rightarrow B$ thì $BC \\rightarrow A$","Nếu $A \\rightarrow B$ thì $AC \\rightarrow B$"],a:3},
{id:64,q:"Quy tắc bắc cầu trong hệ tiên đề Armstrong:",o:["Nếu $A \\rightarrow B$ và $B \\rightarrow C$ thì $A \\rightarrow C$.","Nếu $A \\rightarrow B$ và $B \\rightarrow C$ thì $AC \\rightarrow B$.","Nếu $A \\rightarrow B$ và $B \\rightarrow C$ thì $AB \\rightarrow C$.","Nếu $A \\rightarrow B$ và $B \\rightarrow C$ thì $AC \\rightarrow BC$."],a:0},
{id:65,q:"Nếu $A \\rightarrow B$ và $A \\rightarrow C$ thì suy ra:",o:["$AA \\rightarrow C$","$A \\rightarrow AB$","$A \\rightarrow BC$","$AB \\rightarrow BC$"],a:2},
{id:66,q:"Nếu $A \\rightarrow BC$ suy ra:",o:["$AC \\rightarrow B$ và $A \\rightarrow CC$.","$A \\rightarrow C$.","$A \\rightarrow B$ và $A \\rightarrow C$.","$A \\rightarrow B$"],a:2},
{id:67,q:"$F = \\{A \\rightarrow B,\ C \\rightarrow X,\ BX \\rightarrow Z\\}$, khi đó:",o:["$AB \\rightarrow C \\in F^+$","$A \\rightarrow Z \\in F^+$","$CB \\rightarrow Z \\in F^+$","$AC \\rightarrow Z \\in F^+$"],a:3},
{id:68,q:"$A \\rightarrow B \\in F$ là phụ thuộc hàm đầy đủ khi và chỉ khi:",o:["$\\forall A' \\subset A \\Rightarrow A' \\rightarrow B \\notin F$","$\\forall A' \\subset A \\Rightarrow A' \\rightarrow B \\notin F^+$","$\\forall A' \\subsetneq A \\Rightarrow A' \\rightarrow B \\notin F^+$","$\\forall A' \\subsetneq A \\Rightarrow A' \\rightarrow B \\notin F$"],a:2},
{id:69,q:"Phụ thuộc $X \\rightarrow Y \\in F$ là phụ thuộc hàm không đầy đủ khi và chỉ khi:",o:["$\\exists X\\' \\subset X \\Rightarrow X\\' \\rightarrow Y \\in F^+$","$\\forall X\\' \\subset X \\Rightarrow X\\' \\rightarrow Y \\in F^+$","$\\exists X\\' \\subseteq X \\Rightarrow X\\' \\rightarrow Y \\in F^+$","$\\forall X\\' \\subseteq X \\Rightarrow X\\' \\rightarrow Y \\in F^+$"],a:0},
{id:70,q:"Phụ thuộc nào sau đây là phụ thuộc đầy đủ:",o:["(Số thứ tự, mã lớp) $\\rightarrow$ Họ tên sinh viên.","(Số chứng minh thư, mã nhân viên) $\\rightarrow$ Quá trình công tác.","(Số hoá đơn, mã khách hàng) $\\rightarrow$ Họ tên khách hàng.","(Mã báo, mã khách hàng) $\\rightarrow$ Giá báo."],a:1},
{id:71,q:"Bao đóng của tập các thuộc tính X ứng với tập F:",o:["$X^+ := \\{Y \\mid X \\rightarrow Y \\in F^+\\}$","$X^+ := X \\cup \\{B \\mid A \\rightarrow B \\in F^+\\}$","$X \\supseteq X \\supseteq ... \\supseteq X_n$","$X^+ := X \\cup \\{B \\mid A \\rightarrow B \\in F^+,\ A \\subseteq X,\ B \\notin X\\}$"],a:0},
{id:72,q:"$X \\rightarrow Y$ khi và chỉ khi:",o:["$Y^+ \\supseteq X$","$Y \\subseteq X^+$","$Y^+ \\supseteq X$","$Y \\supseteq X^+$"],a:1},
{id:73,q:"Tập phụ thuộc hàm $F = \\{AB \\rightarrow C, D \\rightarrow EG, C \\rightarrow A, BE \\rightarrow C, BC \\rightarrow D, CG \\rightarrow BD, ACD \\rightarrow B, CE \\rightarrow AG\\}$",o:["$\\{BD\\}^+ = ABCDEG$","$\\{BD\\}^+ = ACDE$","$\\{BD\\}^+ = ABCD$","$\\{BD\\}^+ = AB$"],a:0},
{id:74,q:"Cho $F = \\{A \\rightarrow B, B \\rightarrow C, BC \\rightarrow D, DA \\rightarrow B\\}$.",o:["$A^+ = ABCD$ và $A \\rightarrow AD \\in F^+$","$A^+ = ABCD$ và $A \\rightarrow AD \\notin F^+$","$A^+ \\subset ABCD$ và $A \\rightarrow AD \\in F^+$","$A^+ = ABC$ và $A \\rightarrow AD \\in F^+$"],a:0},
{id:75,q:"Cho $F = \\{A \\rightarrow B, C \\rightarrow X, BX \\rightarrow Z\\}$.",o:["$AC \\rightarrow Z \\in F^+$","$AC \\rightarrow Z^+$","$AC \\rightarrow Z$","$AC \\rightarrow Z \\notin F^+$"],a:0},
{id:76,q:"Cho $F = \\{A \\rightarrow B, C \\rightarrow D\\}, C \\subset B$",o:["$A \\rightarrow D \\in F^+$","$A \\rightarrow D \\notin F^+$","$D \\subset A^+, D^+ = A^+$","Cả 3 đáp án trên đều sai"],a:0},
{id:77,q:"Phụ thuộc $X \\rightarrow Y \\in F$ là phụ thuộc dư thừa, khi và chỉ khi:",o:["$X \\rightarrow Y$ được suy dẫn logic từ tập các phụ thuộc $F$","$X \\rightarrow Y$ không suy dẫn logic từ tập các phụ thuộc $G := F - \\{X \\rightarrow Y\\}$","$X \\rightarrow Y$ không suy dẫn logic từ tập các phụ thuộc $F$","$X \\rightarrow Y$ được suy dẫn logic từ tập các phụ thuộc $G := F - \\{X \\rightarrow Y\\}$"],a:3},
{id:78,q:"Phụ thuộc $X \\rightarrow Y$ được gọi là phụ thuộc không dư thừa, khi và chỉ khi:",o:["$X \\rightarrow Y \\notin G^+ := (F - \\{X \\rightarrow Y\\})^+$","$X \\rightarrow Y \\in F^+$","$X \\rightarrow Y \\notin F^+$","$X \\rightarrow Y \\in G^+ := (F - \\{X \\rightarrow Y\\})^+$"],a:0},
{id:79,q:"Thuộc tính $A_1$ dư thừa vế trái trong $A_1A_2 \\rightarrow B \\in F^+$ khi và chỉ khi:",o:["$(F - \\{A_1A_2 \\rightarrow B\\} \\cup \\{A_2 \\rightarrow B\\})^+ \\subset F^+$","$(F - \\{A_1A_2 \\rightarrow B\\} \\cup \\{A_2 \\rightarrow B\\}) \\equiv F^+$","$(F - \\{A_1A_2 \\rightarrow B\\} \\cup \\{A_2 \\rightarrow B\\})^+ = F^+$","$(F - \\{A_1A_2 \\rightarrow B\\}) \\equiv F^+$"],a:2},
{id:80,q:"Cho $F = \\{X \\rightarrow Z, XY \\rightarrow WP, XY \\rightarrow ZWQ, XZ \\rightarrow R\\}$.",o:["$XY \\rightarrow WP$ chứa thuộc tính $X$ dư thừa","$XY \\rightarrow WP$ không chứa thuộc tính dư thừa vế trái","$XY \\rightarrow WP$ chứa thuộc tính $P$ dư thừa","$XY \\rightarrow WP$ chứa thuộc tính $Y$ dư thừa"],a:1},
{id:81,q:"X là khóa của lược đồ quan hệ $S = \\langle \\Omega, F \\rangle$ khi:",o:["Với mọi $Z \\subset X, (Z \\rightarrow \\Omega) \\in F^+$","$(X \\rightarrow \\Omega) \\in F^+$ và với mọi $Z \\subset X, (Z \\rightarrow \\Omega) \\notin F^+$","$(X \\rightarrow \\Omega) \\in F^+$ và với mọi $Z \\subseteq X, (Z \\rightarrow \\Omega) \\notin F^+$","$(X \\rightarrow \\Omega) \\in F^+$"],a:1},
{id:82,q:"Giá trị các thành phần của khoá quy định:",o:["Có thể nhận giá trị null","Không thể nhận giá trị null hay các giá trị không xác định.","Có thể nhận giá trị null hay các giá trị không xác định.","Không thể nhận giá trị null nhưng có thể nhận các giá trị không xác định"],a:1},
{id:83,q:"Các thuộc tính khóa là",o:["Các thuộc tính không được chứa trong khóa","Các thuộc tính khoá","Các thuộc tính không khóa.","Các phần tử của khóa."],a:3},
{id:84,q:"Các thuộc tính không khoá là các thuộc tính:",o:["Không có mặt trong các thành phần của khoá.","Tập $\\{A \\mid A \\notin K, K \\text{ là khoá bất kỳ}\\}$","Tập $\\{A \\mid A \\in K, K \\text{ là khoá bất kỳ}\\}$","Tập các thuộc tính."],a:0},

{id:86,q:"Quá trình tách không làm tổn thất thông tin theo nghĩa:",o:["Quan hệ gốc được khôi phục từ các quan hệ chiếu.bằng phép kết nối tự nhiên","Quan hệ gốc được khôi phục chính xác từ các quan hệ chiếu.","Quan hệ gốc được khôi phục từ các quan hệ chiếu.bằng phép kết nối","Quan hệ gốc được khôi phục từ các quan hệ chiếu.bằng phép chiếu và chọn"],a:0},
{id:87,q:"Một phép tách của lược đồ quan hệ, ký hiệu là $\\rho[\\Omega_1, \\Omega_2, ..., \\Omega_p]$ nếu:",o:["$\\Omega = \\Omega_1 \\cup ... \\cup \\Omega_p, F_i := \\pi_{\\Omega_i}(F)$","$\\Omega = \\Omega_1 \\cup \\Omega_2 \\cup ... \\cup \\Omega_p$","$\\Omega_1 \\cap ... \\cap \\Omega_p = \\emptyset$","$\\Omega = \\Omega_1 \\times \\Omega_2 \\times ... \\times \\Omega_p$"],a:1},
{id:88,q:"$\\rho = (\\Omega_1, \\Omega_2, ..., \\Omega_p)$ là một phép tách của lược đồ quan hệ, khi đó tập các phụ thuộc chiếu trên $F$:",o:["$F_i := \\pi_{\\Omega_i}(F), i = 1 \\div p$","Chính là tập các phụ thuộc $F$.","Bao đóng các phụ thuộc $F^+$","$G := \\pi_{\\Omega_i}(F)$"],a:0},
{id:89,q:"$\\rho = (\\Omega_1, \\Omega_2, ..., \\Omega_p)$ là một phép tách của lược đồ quan hệ, khi đó quan hệ chiếu trên các tập thuộc tính $\\Omega_i$ với $i = 1 \\div p$ là:",o:["Bao gồm các thuộc tính $\\Omega_1 ... \\Omega_p$","Bao gồm các thuộc tính $\\Omega_1, ..., \\Omega_p$","$R_i := \\pi_{\\Omega_i}(R), i = 1 \\div p$","Bao gồm các thuộc tính $\\Omega$"],a:2},
{id:90,q:"$\\rho = (\\Omega_1, \\Omega_2, ..., \\Omega_p)$ là phép tách - kết nối tự nhiên của lược đồ quan hệ nếu:",o:["Kết nối tự nhiên các quan hệ chiếu.","$\\rho$ là một phép tách và kết nối các quan hệ chiếu.","$\\rho$ là một phép tách và kết nối tự nhiên các quan hệ chiếu.","Kết nối của các quan hệ chiếu"],a:0},
{id:91,q:"$\\rho = (\\Omega_1, \\Omega_2, ..., \\Omega_p)$ là phép tách không tổn thất thông tin, nếu:",o:["Kết quả kết nối tự nhiên các quan hệ chiếu chứa quan hệ gốc.","Kết quả kết nối tự nhiên các quan hệ chiếu chính là quan hệ gốc.","Kết quả kết nối tự nhiên các quan hệ chiếu được chứa trong quan hệ gốc.","Kết quả kết nối các quan hệ chiếu trên một số thuộc tính của quan hệ gốc."],a:1},
{id:92,q:"Mục tiêu của phép tách lược đồ quan hệ là:",o:["Nhằm thực hiện các phép lưu trữ dễ dàng.","Nhằm tối ưu hoá truy vấn","Nhằm loại bỏ các dị thường thông tin khi thực hiện các phép lưu trữ.","Nhằm thực hiện các phép tìm kiếm."],a:2},
{id:93,q:"Cần thiết phải chuẩn hoá dữ liệu vì:",o:["Giá trị khoá nhận giá trị null hay giá trị không xác định.","Khi thực hiện các phép lưu trữ trên các quan hệ chưa được chuẩn hoá thường xuất hiện các dị thường thông tin.","Khi thực hiện các phép tách - kết nối tự nhiiên các quan hệ.","Khi thực hiện các phép tìm kiếm, xuất hiện các dị thường thông tin."],a:1},
{id:94,q:"Dị thường thông tin là nguyên nhân:",o:["Gây cản trở cho việc cập nhật, bổ sung thông tin","Gây cản trở cho việc tách kết nối tổn thất thông tin","Gây cản trở cho việc tìm kiếm, hỏi đáp thông tin.","Gây cản trở cho việc thực hiện các phép lưu trữ"],a:3},
{id:95,q:"Mục tiêu của chuẩn hoá dữ liệu là:",o:["Đảm bảo tính nhất quán dữ liệu.","Triệt tiêu mức cao nhất khả năng xuất hiện các dị thường thông tin.","Đảm bảo tính bảo mật dữ liệu","Đảm bảo cho việc lưu trữ dữ liệu"],a:1},
{id:96,q:"Quá trình chuẩn hoá dữ liệu là quá trình:",o:["Tách lược đồ quan hệ hạn chế thấp nhất tổn thất thông tin .","Thực hiện các phép tìm kiếm dữ liệu.","Chuyển đổi biểu diễn thông tin trong các dạng khác nhau","Tách lược đồ quan hệ không làm tổn thất thông tin ."],a:3},
{id:97,q:"Cơ sở để chuẩn hoá dựa trên các khái niệm:",o:["Bao đóng các phụ thuộc hàm","Phụ thuộc hàm","Các thuộc tính, bao đóng các thuộc tính.","Khoá và siêu khoá."],a:1},
{id:98,q:"Một mô hình CSDL được xem là mô hình chuẩn hoá tốt, nếu:",o:["Không xuất hiện dị thường thông tin.","Đảm bảo tính độc lập dữ liệu.","Mỗi một thuộc tính không khoá phụ thuộc hàm vào khoá.","Mỗi một thuộc tính được biểu diễn trong dạng duy nhất."],a:0},
{id:99,q:"Quan hệ R được gọi là dạng chuẩn 1NF, khi và chỉ khi:",o:["Một thuộc tính có nhiều giá trị khác nhau","Các thuộc tính chỉ chứa các giá trị nguyên tố.","Một quan hệ có nhiều hàng","Một quan hệ có nhiều cột."],a:1},
{id:100,q:"Quan hệ 1NF không thể chấp nhận được trong quá trình tìm kiếm, vì	:",o:["Không đảm bảo tính toàn vẹn dữ liệu.","Khi thao tác các phép lưu trữ thường xuất hiện dị thường thông tin","Cấu trúc biểu diễn dữ liệu phức tạp.","Có quá nhiều phụ thuộc hàm trong nó"],a:1},
{id:101,q:"Quan hệ $R$ được gọi là dạng chuẩn 2NF, khi và chỉ khi:",o:["1NF và các thuộc tính không khoá phụ thuộc đầy đủ vào khoá.","1NF và các thuộc tính không khoá phụ thuộc không đầy đủ vào khoá.","Tồn tại $X \\rightarrow Y \\in F^+$ sao cho $X \\subset K$ ($K$ là khóa) và $Y$ là thuộc tính không khóa.","1NF và tồn tại các thuộc tính không khoá phụ thuộc đầy đủ vào khoá."],a:0},
{id:102,q:"Quan hệ 2NF không thể chấp nhận được trong quá trình tìm kiếm, vì:",o:["Không thể thưc hiện được các phép cập nhật","Bao đóng phụ thuộc hàm quá lớn.","Có thể không thể chèn thêm thông tin","Không đảm bảo tính toàn vẹn dữ liệu."],a:2},
{id:103,q:"Có thể chèn thêm thông tin một loại cáp khi chưa được lắp đặt ?",o:["Không thể được vì dị thường thông tin.","Không thể được vì giá trị khoá không xác định.","Không thể được vì mâu thuẫn thông tin.","Có thể chèn được."],a:1},
{id:104,q:"Quan hệ $R$ được gọi là dạng chuẩn 3NF, khi và chỉ khi:",o:["Nếu $X \\rightarrow Y \\in F^+$ và $Y \\notin X$, thì hoặc $X$ là khóa hoặc $Y$ là thuộc tính khóa.","Không tồn tại $X \\rightarrow Y \\in F^+, X^+ \\neq \\Omega, Y \\notin X$ và $Y$ là thuộc tính không khóa.","Tồn tại $X \\rightarrow Y \\in F^+, Y \\notin X$, hoặc $X$ là khóa hoặc $Y$ là thuộc tính khóa.","Tồn tại $X \\rightarrow Y \\in F^+, X^+ \\neq \\Omega, Y \\notin X$ và $Y$ là thuộc tính không khóa."],a:0},
{id:105,q:"Trong quan hệ dạng chuẩn 3NF:",o:["Không tồn tại các thuộc tính không khoá phụ thuộc vào khoá.","Không tồn tại các thuộc tính không khoá phụ thuộc không đầy đủ vào khoá và sơ đồ bắc cầu.","Tồn tại các thuộc tính không khoá phụ thuộc vào khoá và sơ đồ bắc cầu.","Tồn tại các thuộc tính không khoá phụ thuộc vào khoá"],a:1},

{id:108,q:"Một quan hệ dạng chuẩn 1NF có thể chuyển đổi về nhóm các quan hệ 3NF bằng cách:",o:["Loại bỏ các phụ thuộc bắc cầu vào khoá.","Loại bỏ các phụ thuộc không đầy đủ vào khoá","Loại bỏ các phụ thuộc không đầy đủ vào khoá và bắc cầu vào khoá.","Loại bỏ các phụ thuộc đầy đủ vào khoá và bắc cầu vào khoá."],a:2},

{id:113,q:"Phép chèn thêm là phép toán:",o:["Chèn vào CSDL một số thông tin về một đối tượng","Chèn vào CSDL các thuộc tính mới.","Chèn vào CSDL một số thông tin tuỳ ý","Chèn vào CSDL từ vùng đệm chứa các thông tin về một bản ghi cụ thể."],a:3},
{id:114,q:"Phép xoá là phép toán:",o:["Xoá một thuộc tính hay xoá một nhóm các thuộc tính.","Xoá một quan hệ hay xoá một nhóm các quan hệ","Xoá một hệ CSDL","Xoá một bộ hay xoá một nhóm các bộ."],a:3},

{id:116,q:"Phép chọn SELECT là phép toán:",o:["Tạo một quan hệ mới từ quan hệ nguồn.","Tạo một quan hệ mới, thoả mãn một tân từ xác định.","Tạo một nhóm các phụ thuộc.","Tạo một quan hệ mới, các bộ được rút ra một cách duy nhất từ quan hệ nguồn"],a:1},
{id:117,q:"Phép chiếu PROJECT là phép toán:",o:["Tạo một quan hệ mới, các thuộc tính là các thuộc tính quan hệ nguồn","Tạo một quan hệ mới, các bộ của quan hệ nguồn bỏ đi những bộ trùng lặp","Tạo một quan hệ mới, thoả mãn một tân từ xác định.","Tạo một quan hệ mới, các thuộc tính được biến đổi từ quan hệ nguồn."],a:3},
{id:118,q:"hép kết nối JOIN là phép toán:",o:["Tạo một quan hệ mới,","Tạo một quan hệ mới, các thuộc tính là các thuộc tính quan hệ nguồn.","Tạo một quan hệ mới, thoả mãn một tân từ xác định.","Tạo một quan hệ mới, kêt nối nhiều quan hệ trên miền thuộc tính chung"],a:0},
{id:119,q:"Phép hợp của quan hệ khả hợp $R_1$ và $R_2$:",o:["$R_1 \\cup R_2 = \\{t \\mid t \\in R_1 \\text{ or } t \\in R_2\\}$","$R_1 \\cup R_2 = \\{t \\mid t \\in R_1 \\text{ and } t \\in R_2\\}$","$R_1 \\cap R_2 = \\{t \\mid t \\in R_1 \\text{ and } t \\in R_2\\}$","$R_1 \\cap R_2 = \\{t \\mid t \\in R_1 \\text{ or } t \\in R_2\\}$"],a:0},
{id:120,q:"Phép giao của quan hệ khả hợp $R_1$ và $R_2$:",o:["$R_1 \\cap R_2 = \\{t \\mid t \\in R_1 \\text{ or } t \\in R_2\\}$","$R_1 \\cap R_2 = \\{t \\mid t \\in R_1 \\text{ or } t \\in R_2\\}$","$R_1 \\cap R_2 = \\{t \\mid t \\in R_1 \\text{ and } t \\in R_2\\}$","$R_1 \\cap R_2 = \\{t \\mid t \\in R_1 \\text{ and } t \\in R_2\\}$"],a:2},
{id:121,q:"Hiệu của quan hệ khả hợp $R_1$ và $R_2$:",o:["$R_1 - R_2 = \\{t \\mid t \\in R_1 \\text{ or } t \\notin R_2\\}$","$R_1 - R_2 = \\{t \\mid t \\in R_1 \\text{ or } t \\notin R_2\\}$","$R_1 - R_2 = \\{t \\mid t \\in R_1 \\text{ and } t \\notin R_2\\}$","$R_1 - R_2 = \\{t \\mid t \\in R_1 \\text{ and } t \\notin R_2\\}$"],a:2},
{id:122,q:"Tích Đề Các các quan hệ $R_1(\\Omega)$ và $R_2(\\Sigma)$:",o:["$R_1 \\times R_2 = \\{t \\mid t[\\Omega] \\in R_1 \\text{ and } t[\\Sigma] \\in R_2\\}$","$R_1 \\times R_2 = \\{t \\mid t[\\Omega] \\in R_1 \\text{ or } t[\\Sigma] \\in R_2\\}$","$R_1 \\times R_2 = \\{t \\mid t[\\Omega] \\in R_1 \\text{ or } t[\\Sigma] \\in R_2\\}$","$R_1 \\times R_2 = \\{t \\mid t[\\Omega] \\in R_1 \\text{ and } t[\\Sigma] \\in R_2\\}$"],a:0},
{id:123,q:"Phép chọn - Selection:",o:["$\\sigma_F(R) = \\{ t \\mid t \\in R \\text{ and } t[F] = \\text{\"True\"} \\}$","$\\sigma_F(R) = \\{ t \\mid t \\in R \\text{ and } t[F] = \\text{\"False\"} \\}$","$\\sigma_F(R) = \\{ t \\mid t \\in R \\text{ or } t[F] = \\text{\"False\"} \\}$","$\\sigma_F(R) = \\{ t \\mid t \\in R \\text{ or } t[F] = \\text{\"True\"} \\}$"],a:0},
{id:124,q:"Phép chiếu - Project $\\pi_{A_1,A_2,...,A_k}(R)$:",o:["$\\pi_{A_1,...,A_k}(R) = \\{t[X] \\mid t \\in R, X=(A_1,...,A_k)\\}$","$\\pi_{A_1,...,A_k}(R) = \\{t[X] \\mid t \\notin R, X=(A_1,...,A_k)\\}$","$\\pi_{A_1,...,A_k}(R) = \\{t \\mid t \\in R, X=(A_1,...,A_k)\\}$","$\\pi_{A_1,...,A_k}(R) = \\{t[X] \\mid t \\in R\\}$"],a:0},
{id:125,q:"Phép chia của quan hệ $R_1(\\Omega)$ cho $R_2(\\Sigma)$, với $\\Sigma \\subseteq \\Omega$, là:",o:["$R_1 \\div R_2 := \\{t \\mid \\forall s \\in R_2, (t, s) \\in R_1\\}$","$R_1 \\div R_2 := \\{t \\mid \\exists s \\in R_2, (t, s) \\in R_1\\}$","$R_1 \\div R_2 := \\{t \\mid s \\in R_1, (t, s) \\in R_2\\}$","$R_1 \\div R_2 := \\{t \\mid \\forall s \\in R_1, (t, s) \\in R_2\\}$"],a:0},

{id:166,q:"Chọn một khẳng định nào sau đây là đúng nhất:",o:["Cấu trúc lưu trữ và các hệ chương trình ứng dụng trên độc lập với nhau.","Người sử dụng khi thao tác trên các cơ sở dữ liệu có thể làm thay đổi cấu trúc lưu trữ dữ liệu và chiến lược truy nhập cơ sở dữ liệu.","Mục tiêu của các hệ CSDL là: tính bất biến cuả các hệ ứng dụng đối với sự thay đổi trong cấu trúc lưu trữ và chiến lược truy nhập dữ liệu.","Dữ liệu được biểu diễn, mô tả nhiều cách khác nhau."],a:2},
{id:167,q:"Chọn một khẳng định nào sau đây là đúng: nhất:",o:["Ràng buộc dữ liệu là các khái niệm về phụ thuộc hàm.","Ràng buộc dữ liệu bảo đảm tính độc lập","Các ràng buộc là tập các quy tắc, quy định biểu diễn dữ liệu trong cơ sở dữ liệu.","Giữa các thực thể dữ liệu tồn tại các mối quan hệ, ràng buộc lẫn nhau."],a:2},
{id:168,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về khái niệm mô hình cơ sở dữ liệu Client-Sserver:",o:["Các máy khách chia sẻ xử lý thông tin.","Khi máy khách thực hiện các ứng dụng, nó gửi yêu cầu về máy chủ được kết nối với cơ sở dữ liệu, máy chủ xử lý và gửi trả lại kết quả về máy khách.","Máy chủ và máy khách có quyền truy xuất cơ sở dữ liệu","Máy khách truy xuất cơ sở dữ liệu trên máy chủ qua môi trường mạng."],a:1},
{id:169,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về đặc trưng của một mô hình dữ liệu là",o:["Sử dụng ngôn ngữ bậc cao để biểu diễn các phép toán trên cơ sở dữ liệu.","Mô hình có cấu trúc đơn giản, có cách nhìn trong suốt đối với người sử dụng.","Phải kiểm tra tính dư thừa.","Có tính ổn định khi thiết kế, đơn giản, dễ thao tác. Có tính đối xứng và có cơ sở lý thuyết vững chắc."],a:3},
{id:170,q:"Chọn một khẳng định nào sau đây là đúng nhất",o:["CSDL là tập bảng và mỗi bảng là một cấu trúc hai chiều","Dữ liệu được người sử dụng nhìn dưới dạng một quan hệ toán học và các phép toán thao tác dữ liệu được xây dựng trên các cấu trúc quan hệ toán học.","Dữ liệu được người sử dụng nhìn dưới dạng một cấu trúc hình cây.","Gồm nhiều tệp dữ liệu có cấu trúc xác định."],a:1},
{id:171,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về ngôn ngữ dữ liệu thao tác trên quan hệ:",o:["Ngôn ngữ con dữ liệu biếu diễn dữ liệu một cách duy nhất.","Là tập các phép toán thao tác trên các dữ liệu dưới dạng quan hệ","Ngôn ngữ con dữ liệu liên kết các thực thể dữ liệu quan hệ.","Ngôn ngữ con dữ liệu gồm nhóm các phép toán tìm kiếm và cập nhật, lưu trữ,	thao tác trên các quan hệ"],a:3},
{id:172,q:"Chọn một khẳng định nào sau đây là đúng nhất:",o:["Các câu hỏi tìm kiếm không đối xứng.","Các phép toán lưu trữ có khả năng xử lý tập hợp theo lô, kết quả là quan hệ.","Kết quả của các phép tìm kiếm là một quan hệ.","Các phép lưu trữ làm mất đi sự nhất quán và tính toàn vẹn dữ liệu."],a:2},
{id:173,q:"Chọn một khẳng định nào sau đây là đúng nhất:",o:["$S \\cup R := \\{ t \\mid t \\in S \\}$","$R \\cap S := \\{ t \\mid t \\in R \\text{ and } t \\in S \\}$","$R \\cup S := \\{ t \\mid t \\in R \\text{ or } t \\in S \\}$","$S \\cap R := \\{ t \\mid t \\in R\\}$"],a:2},
{id:174,q:"Chọn một khẳng định nào sau đây là đúng nhất khi định nghĩa phép trừ 2 quan hệ:",o:["$R - S := \\{ t \\mid t \\in R \\text{ or } t \\notin S \\}$","$R - S := \\{ t \\mid t \\in R \\text{ and } t \\notin S \\}$","$S - R := \\{ t \\mid t \\in S \\text{ and } t \\notin R\\}$","$S - R := \\{ t \\mid t \\in R \\text{ and } t \\notin S \\}$"],a:1},
{id:175,q:"Chọn một khẳng định nào sau đây là đúng nhất khi định nghĩa tích Đề Các của hai quan hệ:",o:["$S \\times R := \\{ t = \\langle r,s \\rangle \\mid r \\in R \\text{ or } s \\in S \\}$","$R \\times S := \\{ t = \\langle r,s \\rangle \\mid r \\in R \\text{ and } s \\in S \\}$","$S \\times R := \\{ t = \\langle r,s \\rangle \\mid \\langle r,s \\rangle \\in R \\}$","$R \\times S := \\{ t = \\langle r,s \\rangle \\mid r \\in R \\text{ or } s \\in S \\}$"],a:1},
{id:176,q:"Chọn một khẳng định nào sau đây là đúng nhất khi định nghĩa phép chiếu:",o:["$\\pi_{A_1, ..., A_k}(R) := \\{ \\langle a_1, ..., a_k \\rangle \\mid \\langle a_1, ..., a_n \\rangle \\in R \\}$","$\\pi_{A_1, ..., A_k}(R) := \\{ \\langle a_1, ..., a_n \\rangle \\mid \\langle a_1, ..., a_k \\rangle \\in R \\}$","$\\pi_{A_1, ..., A_k}(R) := \\{ a_1, ..., a_k \\mid a_1, ..., a_n \\in R \\}$","Tất cả các định nghĩa trên đều sai"],a:0},
{id:177,q:"Chọn một khẳng định nào sau đây là đúng nhất khi định nghĩa phép chọn:",o:["$\\sigma_F(R) := \\{ t \\mid t = \\text{\"True\"} \\}$","$\\sigma_F(R) := \\{ t \\mid t \\in R \\}$","$\\sigma_F(R) := \\{ t \\mid t \\in R \\text{ and } t(F) = \\text{\"True\"} \\}$","$\\sigma_F(R) := \\{ t \\mid t(F) = \\text{\"True\"} \\}$"],a:2},
{id:178,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về mối liên kết giữa các thực thể trong mô hình thực thể quan hệ:",o:["Mối quan hệ giữa các thực thể chỉ có thể là một - một hoặc một - nhiều.","Mối quan hệ giữa các thực thể có thể là một - một, một - nhiều và nhiều - nhiều.","Trong lược đồ quan hệ, cấu trúc dữ liệu nhiều - nhiều không thể chuyển về dạng một - nhiều.","Thực thể là những đối tượng dữ liệu cơ bản chứa nội dung các thông tin."],a:1},
{id:179,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về các bước triển khai mô hình thực thể quan hệ:",o:["Xác định nội dung, yêu cầu của các thực thể.","Phân tích yêu cầu, xác định các thực thể và các mối liên kết, tích hợp yêu cầu, chuyển đổi về các quan hệ, chuẩn hoá dữ liệu và thiết kế vật lý.","Mô tả thông tin về các đối tượng và xác định mối quan hệ giữa các đối tượng cần thiết kế.","Phân tích yêu cầu, xác định các thực thể, chuẩn hoá dữ liệu và thiết kế vật lý."],a:1},
{id:180,q:"Chọn một khẳng định nào sau đây là đúng nhất:",o:["$R(\\Omega) = D(a_1) \\times D(a_2) \\times ... \\times D(a_n)$","$R(\\Omega) \\subseteq D(a_1) \\bowtie D(a_2) \\bowtie ... \\bowtie D(a_n)$","$R(\\Omega) = \\{ (d_1, d_2, ..., d_n) \\mid d_i \\in D(A_i), A_i \\in \\Omega, i = 1 \\div n \\}$","$R(\\Omega) \\subseteq D(a_1) \\times D(a_2) \\times ... \\times D(a_n)$"],a:3},
{id:181,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về tập con thuộc tính:",o:["Các thuộc tính của $X$ cũng là thuộc tính của $Y$ và ngược lại.","$X \\subset Y$ khi và chỉ khi $\\forall A \\in X \\Rightarrow A \\in Y$.","$X \\subset Y$ khi và chỉ khi $\\forall A \\notin X \\Rightarrow A \\in Y$.","$X \\subset Y$ khi và chỉ khi các thuộc tính của $Y$ là thuộc tính của $X$."],a:1},
{id:182,q:"Chọn một khẳng định nào sau đây là đúng nhất khi chiếu $X$ trên bộ $r$:",o:["Nếu $r := (d_1, d_2, ..., d_n)$ khi đó $r[X] := (d_1, d_2, ..., d_n)$","$r[X]$ là các giá trị của bộ $r$ trên tập thuộc tính $X \\subseteq \\Omega$.","$r[X]$ là các giá trị của $X \\subseteq \\Omega$","$r[X] = (d_1, d_2, ..., d_n)$"],a:1},
{id:183,q:"Chọn một khẳng định nào sau đây là đúng nhất",o:["Chuẩn hoá dữ liệu dựa trên các khái niệm phụ thuộc hàm.","Phụ thuộc hàm mô tả các phương pháp biểu diễn dữ liệu","Phụ thuộc hàm mô tả các ràng buộc trong cơ sở dữ liệu.","Các phương pháp chuẩn hoá dữ liệu."],a:0},
{id:184,q:"Chọn một khẳng định nào sau đây là đúng nhất:",o:["$X$ xác định $Y$ nếu các giá trị của $X$ xác định các giá trị của $Y$.","$X$ xác định $Y$ nếu $r$ và $s$ trùng nhau trên $X$ thì cũng trùng nhau trên $Y$.","$X \\rightarrow Y$, $\\forall r, s \\in R, (r(X) = s(X)) \\Rightarrow r(Y) = s(Y)$","$\\forall r, s \\in R, (\\forall a \\in X) (r(a) = s(a)) \\Rightarrow (\\forall b \\in Y) (r(b) = s(b))$"],a:1},
{id:185,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về các phụ thuộc hàm phản xạ:",o:["Phụ thuộc mà vế trái được chứa trong vế phải.","Với mọi $B \\subseteq A \\Rightarrow A \\rightarrow B$.","Phụ thuộc mà vế phải được chứa trong vế trái.","Phụ thuộc vào $\\Omega$, không phụ thuộc vào $F$."],a:2},
{id:186,q:"Chọn một khẳng định nào sau đây là đúng nhất:",o:["Số điện thoại $\\rightarrow$ Mã vùng là phụ thuộc phản xạ.","Số điện thoại $\\rightarrow$ Họ tên thuê bao là phụ thuộc phản xạ.","(Số thứ tự, Mã lớp) $\\rightarrow$ Mã lớp là phụ thuộc phản xạ.","Số chứng minh thư $\\rightarrow$ Họ tên là phụ thuộc phản xạ."],a:2},
{id:187,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về các phụ thuộc hàm gia tăng:",o:["Có thể mở rộng vế trái hoặc cả hai vế phụ thuộc hàm cùng một thuộc tính.","$A \\rightarrow B \\Rightarrow A \\rightarrow BC$","$A \\rightarrow B \\Rightarrow AC \\rightarrow B$ và $A \\rightarrow BC$","Có thể mở rộng vế trái, không mở rộng vế phải"],a:0},
{id:188,q:"Chọn một khẳng định đúng nhất khi nói về phụ thuộc bắc cầu:",o:["Nếu $A \\rightarrow B$ và $B \\rightarrow C$ thì suy ra $AC \\rightarrow BC$","Nếu $A \\rightarrow B$ và $B \\rightarrow C$ suy ra $A \\rightarrow C$","Nếu thuộc tính 1 xác định thuộc tính 2, hoặc xác định thuộc tính 3, khi đó thuộc tính 1 xác định thuộc tính 3","Nếu một thuộc tính xác định thuộc tính 2 thì nó xác định thuộc tính 3"],a:1},
{id:189,q:"Chọn một khẳng định đúng nhất cho hệ quả phụ thuộc hàm:",o:["$A \\rightarrow B$ và $BC \\rightarrow Z \\Rightarrow AC \\rightarrow Z$","$AC \\rightarrow B$ và $B \\rightarrow Z \\Rightarrow AC \\rightarrow Z$","$A \\rightarrow B$ và $B \\rightarrow Z \\Rightarrow AC \\rightarrow Z$","$A \\rightarrow BC$ và $BC \\rightarrow Z \\Rightarrow AC \\rightarrow Z$"],a:0},
{id:190,q:"Chọn một khẳng định đúng nhất cho hệ quả phụ thuộc hàm:",o:["Tên thuê bao $\\rightarrow$ Số điện thoại thuê bao","$A \\rightarrow B$ và $A \\rightarrow C \\Rightarrow A \\rightarrow BC$","$A \\rightarrow B$ và $A \\rightarrow C \\Rightarrow B \\rightarrow BC$","$AA \\rightarrow AB$ và $AA \\rightarrow C \\Rightarrow A \\rightarrow BC$"],a:1},
{id:191,q:"Chọn một khẳng định nào sau đây là đúng nhất",o:["Thuộc tính vế phải sẽ xác định các thành phần trong vế trái","Thuộc tính vế trái sẽ xác định các thành phần trong vế phải.","Thuộc tính vế trái có mặt trong vế phải.","Thuộc tính vế trái sẽ xác định các thành phần trong vế phải"],a:1},
{id:192,q:"Chọn một khẳng định đúng nhất:",o:["Nếu $A \\rightarrow B$ và $B \\rightarrow C$ khi đó $A \\rightarrow BC$","Nếu $A \\rightarrow B$ và $C \\subseteq \\Omega$ khi đó $A \\rightarrow BC$","Nếu $A \\rightarrow B$ và $C \\subseteq \\Omega$ khi đó $AC \\rightarrow BC$","Nếu $A \\rightarrow B$ và $B \\rightarrow C$ khi đó $A \\rightarrow C$"],a:3},
{id:193,q:"Chọn một khẳng định đúng nhất:",o:["Nếu $A \\rightarrow B$ và $A \\rightarrow C$ khi đó $AC \\rightarrow B$","Nếu $A \\rightarrow B$ và $C \\subseteq B$ khi đó $A \\rightarrow C$","Nếu $A \\rightarrow B$ và $C \\subset B$ khi đó $A \\rightarrow C$","Nếu $A \\rightarrow B$ và $A \\rightarrow C$ khi đó $A \\rightarrow BC$"],a:3},
{id:194,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về các phụ thuộc đầy đủ:",o:["Các thuộc tính vế phải không xác định vế trái.","Các thuộc tính vế trái không xác định các thuộc tính thuộc vế phải.","Các thuộc tính vế trái xác định vế phải.","Các thuộc tính vế trái không xác định vế phải."],a:2},
{id:195,q:"Phụ thuộc nào sau đây là phụ thuộc đầy đủ:",o:["(Mã nhân viên, tên nhân viên) xác định đơn vị công tác.","(Số thứ tự, đơn vị) xác định ưôs thứ tự trong bảng lương.","Mã nhân viên xác định quá trình công tác nhân viêb đó","Số thứ tự xác định tiền lương của một nhân viên"],a:2},
{id:196,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về bao đóng các thuộc tính:",o:["Hợp tất cả vế phải của các phụ thuộc hàm","Bao đóng của X ứng với tập F là hợp của vế trái của các phụ thuộc hàm","Bao đóng của X ứng với tập F là hợp của vế phải của các phụ thuộc hàm","Thông tin về đối tượng ."],a:1},
{id:197,q:"Sự tương đương giữa bao đóng và phụ thuộc hàm:",o:["$X \\rightarrow Y^+ \\iff X \\rightarrow Y$","$X \\rightarrow Y \\iff Y^+ \\subseteq X$","$X \\rightarrow Y \\iff Y \\subseteq X^+$","$Y \\subseteq X^+ \\iff X \\rightarrow Y$"],a:3},
{id:198,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về tập tương đương:",o:["Tập G là tập con của F.","Các phụ thuộc của G là các phụ thuộc của F","Các phụ thuộc của F được suy dẫn logic từ G và các phụ thuộc của G được suy dẫn logic từ F.","Các phụ thuộc của F cũng là các phụ thuộc của G và ngược lại."],a:2},
{id:199,q:"Chọn một khẳng định đúng nhất khi nói về thuộc tính dư thừa:",o:["$A_1A_2 \\rightarrow B$, $A_1$ dư thừa khi $A_2 \\rightarrow B \\in F^+$","$A_1A_2 \\rightarrow B$, $A_1$ dư thừa khi $A_1A_2 \\rightarrow B$ phụ thuộc đầy đủ","$A_1A_2 \\rightarrow B$, $A_1$ dư thừa khi $A_2 \\rightarrow B$ phụ thuộc đầy đủ","$A_1A_2 \\rightarrow B$, $A_1$ dư thừa khi $A_2$ không xác định $B$"],a:0},
{id:200,q:"Xác định thuộc tính dư thừa $A_i$ trong phụ thuộc $A_1A_2...A_n \\rightarrow B \\in F^+$:",o:["Kiểm tra $(A_1...A_{i-1}A_{i+1}...A_n \\rightarrow B) \\in F^+$","Kiểm tra $(A_1...A_{i-1}A_{i+1}...A_n)^+ \\rightarrow B$","Kiểm tra $B \\subseteq (A_1...A_{i-1}A_{i+1}...A_n)^+$","Loại bỏ tạm thời $A_i$, kiểm tra $(A_1...A_{i-1}A_{i+1}...A_n \\rightarrow B) \\in F$"],a:2},
{id:201,q:"Với $F=\\{X \\rightarrow Z, XY \\rightarrow WP, XY \\rightarrow ZWQ, XZ \\rightarrow R\\}$:",o:["Vế trái của $X \\rightarrow Z$ có chứa thuộc tính dư thừa.","Vế trái của $XY \\rightarrow WP$ có chứa thuộc tính dư thừa.","Vế trái của $XZ \\rightarrow R$ có chứa thuộc tính dư thừa.","Cả 3 khẳng định trên đều sai."],a:2},
{id:202,q:"Chọn một khẳng định nào sau đây là đúng nhất:",o:["Phụ thuộc có vế trái dư thừa là phụ thuộc bắc cầu","Phụ thuộc dư thừa có thể là phụ thuộc có vế trái dư thừa.","Phụ thuộc có vế trái dư thừa là phụ thuộc đầy đủ","Phụ thuộc dư thừa là phụ thuộc có vế trái dư thừa."],a:1},
{id:203,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về khoá của lược đồ quan hệ:",o:["Giá trị của mỗi thuộc tính có thể xác định duy nhất giá trị các thuộc tính khác.","Khoá gồm nhiều thuộc tính có khả năng biểu diễn các thuộc khác","Giá trị của một hay nhiều thuộc tính có thể xác định duy nhất giá trị các thuộc tính khác kể cả giá trị null.","Khoá là một thuộc tính hay một tập các thuộc tính có khả năng biểu diễn duy nhất các thuộc tính còn lại."],a:3},
{id:204,q:"Chọn một khẳng định nào sau đây là đúng nhất:",o:["$X$ là khóa nếu: $X^+ = \\Omega$ và $\\forall A \\in X, (X - A)^+ \\neq \\Omega$","Các thuộc tính không khoá phụ thuộc đầy đủ vào khóa.","Mỗi một giá trị của khoá xác định các giá trị của các thuộc tính không khoá.","Giá trị các khoá có thể trùng nhau."],a:0},

{id:217,q:"Chọn một khẳng định nào sau đây là đúng nhất khi nói về dạng chuẩn 2NF:",o:["Không tồn tại các thuộc tính khoá phụ thuộc không đầy đủ vào khoá.","Tồn tại $X \\rightarrow Y \\in F^+$, sao cho $X \\subset \\Omega$ và $Y$ là thuộc tính không khóa.","Tồn tại $X \\rightarrow Y \\in F^+$, sao cho $X$ là tập con của khóa và $Y$ là thuộc tính khóa.","Tồn tại các thuộc tính khoá phụ thuộc đầy đủ vào khoá."],a:0},

{id:272,q:"Nói rằng $R$ là một quan hệ trên tập $\\Omega := \\{A_1, A_2, ..., A_n\\}$ khi và chỉ khi:",o:["$R(\\Omega) \\subseteq Dom(A_1) \\bowtie ... \\bowtie Dom(A_n)$","$R(\\Omega) = Dom(A_1) \\times Dom(A_2) \\times ... \\times Dom(A_n)$","$R(\\Omega) \\subseteq Dom(A_1) \\times Dom(A_2) \\times ... \\times Dom(A_n)$","$R(\\Omega) = \\{ r \\mid r : \\Omega \\rightarrow D(A), A \\in \\Omega \\}$"],a:2},
{id:273,q:"$X$ và $Y$ là 2 tập con của $\\Omega$. $Y$ phụ thuộc hàm vào $X$ nếu $\\forall r_1, r_2 \\in R(\\Omega)$:",o:["$r_1[X] = r_2[X] \\Rightarrow r_1[Y] = r_2[Y]$","$r_1[X] \\neq r_2[X] \\Rightarrow r_1[Y] \\neq r_2[Y]$","$r_1[X] \\subset r_2[X] \\Rightarrow r_1[Y] \\subset r_2[Y]$","$r_1[X] = r_2[X] \\Rightarrow r_1[Y] \\neq r_2[Y]$"],a:0},
{id:274,q:"Hãy chọn từ/cụm từ tương ứng để hoàn thiện khẳng định sau: Nói rằng $A \\rightarrow B$ được suy dẫn từ $F$, nếu ......",o:["Hai bộ bất kỳ trùng nhau trên A thì khác nhau trên B.","Hai bộ bất kỳ thoả trên trên A thì thoả trên B.","Hai bộ bất kỳ khác nhau trên A thì cũng khác nhau trên B.","Áp dụng liên tiếp các hệ tiên đề Armstrong"],a:3},
{id:275,q:"Hãy chọn từ/cụm từ tương ứng để hoàn thiện khẳng định sau: Bao đóng tập các phụ thuộc hàm gồm các phụ thuộc.......",o:["Bắc cầu.được suy dẫn logic","Được suy dẫn bằng định nghĩa.","Được suy dẫn bằng cách áp dụng liên tiếp các hệ tiên đề Armstrong.","Đầy đủ.được suy dẫn logic"],a:2},
{id:276,q:"Phụ thuộc $X \\rightarrow Y \\in F$ là phụ thuộc hàm đầy đủ, khi và chỉ khi:",o:["Mọi con thực sự của $X$ xác định $Y$","Tập con thực sự của $X$ xác định $Y$","Tồn tại tập con của $X$ xác định $Y$","$X$ không chứa thuộc tính dư thừa"],a:3},
{id:277,q:"$F$ là tập các phụ thuộc hàm và $X \\subseteq \\Omega$. Khi đó bao đóng của $X$ ứng với tập $F$ là:",o:["$X^+ := \\{B \\mid X \\rightarrow B \\in F^+\\}$","$X^+ := \\{A \\rightarrow B \\mid A \\rightarrow B \\in F^+\\}$","$X^+ := \\{A \\rightarrow B \\mid A \\rightarrow B \\in F\\}$","$X^+ := \\{A \\mid X \\rightarrow A \\in F^+\\}$"],a:0},
{id:278,q:"Hãy chọn từ/cụm từ tương ứng để hoàn thiện khẳng định sau: Tập các phụ thuộc hàm $F$ và $G$ tương đương, $F^+ \\equiv G^+$, khi và chỉ khi........",o:["Các phụ thuộc của F được suy dẫn logic từ G và ngược lại.","Các phụ thuộc của G không được suy dẫn logic từ F","Tồn tại phụ thuộc của G được suy dẫn logic từ F","Các phụ thuộc của G được suy dẫn logic từ F."],a:0},
{id:279,q:"Nếu một phụ thuộc hàm $A \\rightarrow B \\in F^+$ mà vế trái $A$ chứa thuộc tính dư thừa, khi đó:",o:["$A^+ = \\Omega$","$A \\rightarrow B \\in F^+$ là phụ thuộc đầy đủ","$A \\rightarrow B \\in F^+$ là phụ thuộc không đầy đủ","$A \\rightarrow B \\in F^+$"],a:2},

let customNotes = {};
try {
  const savedNotes = localStorage.getItem('csdl_notes');
  if (savedNotes) customNotes = JSON.parse(savedNotes);
} catch(e){}


function saveNote(qId) {
  const txt = document.getElementById(`custom-note-${qId}`).value.trim();
  if (txt === '') {
    delete customNotes[qId];
    showToast('🗑️ Đã xóa ghi chú cá nhân của câu này');
  } else {
    customNotes[qId] = txt;
    showToast('📌 Đã lưu ghi chú!');
  }
  localStorage.setItem('csdl_notes', JSON.stringify(customNotes));
  
  // Nếu đang ở màn hình xem Ghi chú, tải lại trang để ẩn câu vừa xóa
  if (state.mode === 'notes') renderNotesView();
}

// ============================================================
// NÂNG CẤP LƯU PHIÊN HỌC (CHỐNG MẤT KHI F5)
// ============================================================
function saveState() {
  // Cập nhật vị trí hiện tại vào session riêng của thẻ đang học
  const key = `${state.chapterId}_${state.filter}`;
  state.sessions[key] = {
    queue: state.queue,
    qIdx: state.qIdx
  };

  try { 
    localStorage.setItem(STATE_KEY, JSON.stringify({
      progress: state.progress,
      sessions: state.sessions, // Lưu toàn bộ các sessions
      chapterId: state.chapterId,
      filter: state.filter,
      isShuffled: state.isShuffled
    })); 
  } catch(e){}
}

function loadState() {
  // Kiểm tra URL hash — dùng để nhập tiến trình từ thiết bị khác
  try {
    const hash = window.location.hash;
    if (hash && hash.startsWith('#data=')) {
      const encoded = hash.slice(6);
      const d = JSON.parse(decodeURIComponent(atob(encoded)));
      state.progress = d.progress || {};
      state.sessions = d.sessions || {};
      state.chapterId = d.chapterId !== undefined ? d.chapterId : 0;
      state.filter = d.filter || 'all';
      state.isShuffled = !!d.isShuffled;
      if (d.notes) customNotes = d.notes;
      localStorage.setItem(STATE_KEY, JSON.stringify({
        progress: state.progress, sessions: state.sessions,
        chapterId: state.chapterId, filter: state.filter, isShuffled: state.isShuffled
      }));
      if (d.notes) localStorage.setItem('csdl_notes', JSON.stringify(customNotes));
      history.replaceState(null, '', window.location.pathname + window.location.search);
      setTimeout(() => showToast('✅ Nhập tiến trình từ link thành công!', 3500), 400);
      return;
    }
  } catch(e) {}

  try {
    const s = localStorage.getItem(STATE_KEY);
    if (s) {
      const d = JSON.parse(s);
      state.progress = d.progress || {};
      state.sessions = d.sessions || {};
      state.chapterId = d.chapterId !== undefined ? d.chapterId : 0;
      state.filter = d.filter || 'all';
      state.isShuffled = !!d.isShuffled;

      // Khôi phục lại trạng thái của thẻ cuối cùng người dùng xem
      const key = `${state.chapterId}_${state.filter}`;
      if (state.sessions[key]) {
        state.queue = state.sessions[key].queue || [];
        state.qIdx = state.sessions[key].qIdx || 0;
      }
    }
  } catch(e){}
}

function exportStateAsURL() {
  const data = {
    progress: state.progress,
    sessions: state.sessions,
    chapterId: state.chapterId,
    filter: state.filter,
    isShuffled: state.isShuffled,
    notes: customNotes
  };
  try {
    const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
    const url = window.location.origin + window.location.pathname + '#data=' + encoded;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => {
        showToast('✅ Đã copy link! Mở link đó trên điện thoại là xong.', 4000);
      }).catch(() => {
        prompt('Copy link này, mở trên điện thoại là xong:', url);
      });
    } else {
      prompt('Copy link này, mở trên điện thoại là xong:', url);
    }
  } catch(e) {
    showToast('❌ Lỗi tạo link, thử lại!');
  }
}

loadState();

// Migrate: câu nào còn wrong>0 thì set everWrong để tương thích với version mới
Object.keys(state.progress).forEach(id => {
  const p = state.progress[id];
  if (p && p.wrong > 0 && !p.everWrong) p.everWrong = true;
});

function getQ(id) { return QUESTIONS.find(q => q.id === id); }

function chapterQuestions(chapterId, filter) {
  const ch = CHAPTERS.find(c => c.id === chapterId);
  let ids = ch ? ch.ids : QUESTIONS.map(q=>q.id);
  ids = ids.filter(id => QUESTIONS.find(q=>q.id===id));
  if (filter === 'wrong') ids = ids.filter(id => (state.progress[id]||{}).everWrong === true);
  if (filter === 'unsure') ids = ids.filter(id => (state.progress[id]||{}).unsure);
  if (filter === 'marked') ids = ids.filter(id => (state.progress[id]||{}).marked);
  return ids;
}

function toggleShuffle() {
  state.isShuffled = !state.isShuffled;
  state.queue = buildQueue(state.chapterId, state.filter);
  state.qIdx = 0; 
  saveState(); // Cập nhật cấu hình
  showToast(state.isShuffled ? '🔀 Đã BẬT đảo ngẫu nhiên' : '⬇️ Đã TẮT đảo (hiện theo thứ tự)');
  loadQuestion();
}

function resetCurrentChapter() {
  if (!confirm('⚠️ Bạn có chắc muốn làm lại từ đầu phần này? (Xóa lịch sử đúng/sai và quay về câu 1)')) return;

  // 1. Xóa lịch sử đúng/sai của các câu trong phần này
  state.queue.forEach(id => {
    delete state.progress[id];
  });

  // 2. Bắt buộc reset vị trí về 0 và lấy lại danh sách câu hỏi ban đầu
  state.qIdx = 0;
  state.queue = buildQueue(state.chapterId, state.filter);

  // 3. Cập nhật lại session ngay lập tức với qIdx = 0
  const key = `${state.chapterId}_${state.filter}`;
  state.sessions[key] = {
    queue: state.queue,
    qIdx: 0
  };

  // 4. Lưu lại trạng thái mới và tải lại câu hỏi
  saveState();
  showToast('Đã reset! Bắt đầu lại từ câu 1.');
  loadQuestion();
}

function buildQueue(chapterId, filter) {
  let ids = chapterQuestions(chapterId, filter);

  if (!state.isShuffled) {
    // Nếu tắt đảo: Sắp xếp theo đúng thứ tự ID từ nhỏ đến lớn
    ids.sort((a, b) => a - b);
  } else {
    // Nếu bật đảo: Xáo trộn ngẫu nhiên hoàn toàn
    ids = shuffleArray(ids);
  }
  return ids;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function getShuffledOpts(q) {
  const opts = q.o.map((text,origIdx)=>({text,origIdx}));
  return shuffleArray(opts);
}

function initProgress(id) {
  if (!state.progress[id]) state.progress[id] = {correct:0, wrong:0, unsure:false, marked:false};
}

// ============================================================
// STATS
// ============================================================
function totalStats() {
  let known=0, unknown=0, unseen=0;
  QUESTIONS.forEach(q => {
    const p = state.progress[q.id];
    if (!p || (p.correct===0 && p.wrong===0)) unseen++;
    else if (p.correct>0 && p.wrong===0) known++;
    else unknown++;
  });
  return {known, unknown, unseen, total:QUESTIONS.length};
}

function startStudy(chapterId, filter='all') {
  state.singleQuestionMode = false;
  state.returnView = null;
  state.chapterId = chapterId;
  state.filter = filter;
  const key = `${chapterId}_${filter}`;

  // Kiểm tra xem thẻ này đã được học dở trước đó chưa
  if (state.sessions[key] && state.sessions[key].queue && state.sessions[key].queue.length > 0) {
    // Nếu có, lôi từ trong session ra để làm tiếp
    state.queue = state.sessions[key].queue;
    state.qIdx = state.sessions[key].qIdx;
  } else {
    // Nếu chưa, tạo danh sách câu hỏi mới từ đầu
    state.queue = buildQueue(chapterId, filter);
    state.qIdx = 0;
    // Khởi tạo luôn session cho thẻ này
    state.sessions[key] = { queue: state.queue, qIdx: 0 };
  }
  
  if (state.queue.length === 0) {
    showToast('Không có câu nào! Thay đổi bộ lọc nhé.');
    return;
  }
  
  state.answered = false;
  saveState(); // Lưu trạng thái
  state.mode = 'study';
  loadQuestion();
}

function loadQuestion() {
  if (state.qIdx >= state.queue.length) {
    const key = `${state.chapterId}_${state.filter}`;
    state.queue = [];
    state.qIdx = 0;
    state.sessions[key] = { queue: [], qIdx: 0 };
    saveState();
    showToast('🎉 Đã hoàn thành danh sách câu hỏi!');
    renderHome();
    return;
  }
  const qId = state.queue[state.qIdx];
  const q = getQ(qId);
  state.shuffledOpts = getShuffledOpts(q);
  state.answered = false;
  renderStudy();
}

function renderStudy() {
  const qId = state.queue[state.qIdx];

    const pr = state.progress[id];
    if (pr && pr.wrong > 0) countWrong++;
    else if (pr && pr.correct > 0) countCorrect++;
  });

  const pct = Math.round(state.qIdx / state.queue.length * 100);

  let filterLabel = '';
  if (state.filter==='wrong') filterLabel = ' · 🔴 Câu sai';
  else if (state.filter==='marked') filterLabel = ' · 🔖 Đã đánh dấu';

  let html = `

      <div style="font-size:13px;color:var(--accent);font-weight:700;margin-bottom:2px">${chName}${filterLabel}</div>

    </div>
    ${state.singleQuestionMode
      ? `<button class="btn btn-secondary btn-sm" onclick="${state.returnView === 'wrongList' ? 'renderWrongList()' : 'renderMarkedList()'}">← Quay lại danh sách</button>`
      : `<button class="btn btn-secondary btn-sm" onclick="renderHome()">← Về trang chủ</button>`}
  </div>

  <div class="flag-row">
    <button id="btn-flag-marked" class="flag-btn ${markedActive}" onclick="toggleFlag('marked',${qId})">🔖 Đánh dấu</button>
    ${state.singleQuestionMode ? '' : `
    <button class="flag-btn" onclick="toggleShuffle()" style="margin-left:auto; border-color:var(--accent); color:var(--accent)">
      🔀 Đảo câu: ${state.isShuffled ? 'BẬT' : 'TẮT'}

  </div>`;

function removeFromMarked(qId) {

  renderMarkedList();

function jumpToQuestionInFilter(qId, chapterId, filter) {
  state.singleQuestionMode = true;
  state.returnView = filter === 'wrong' ? 'wrongList' : 'markedList';
  state.chapterId = chapterId;
  state.filter = filter;
  const key = `${chapterId}_${filter}`;

  state.queue = buildQueue(chapterId, filter);

  const idx = state.queue.indexOf(qId);
  if (idx !== -1) {
    state.qIdx = idx;
    state.sessions[key] = { queue: state.queue, qIdx: state.qIdx };
    saveState();

    state.answered = false;
    state.mode = 'study';

    const q = getQ(qId);
    state.shuffledOpts = getShuffledOpts(q);
    renderStudy();
  }
}
